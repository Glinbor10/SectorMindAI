[pytest]
testpaths = backend/tests rasa_model/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short
markers =
    integration: Tests de integración con APIs externas (requieren conexión a internet)
    slow: Tests lentos que pueden tardar varios segundos

[coverage:run]
source = backend, rasa_model/actions
omit = 
    */tests/*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
