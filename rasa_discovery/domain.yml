version: "3.1"

intents:
  - greet
  - goodbye
  - buscar_negocio
  - nlu_fallback

slots:
  ubicacion_lat:
    type: float
    influence_conversation: false
    mappings:
      - type: custom
  ubicacion_lon:
    type: float
    influence_conversation: false
    mappings:
      - type: custom
  ubicacion_precision_m:
    type: float
    influence_conversation: false
    mappings:
      - type: custom
  opciones_negocio:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

responses:
  utter_goodbye:
    - text: "¡Hasta pronto! Vuelve cuando necesites encontrar un negocio."

actions:
  - action_discovery_buscar_negocios

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
