version: "3.1"

intents:
  - greet
  - goodbye
  - informar_ubicacion
  - buscar_negocio
  - afirmar
  - negar
  - nlu_fallback

entities:
  - ubicacion_texto

slots:
  ubicacion_texto:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        intent: informar_ubicacion
      - type: custom
  ubicacion_pendiente_confirmar:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
  esperando_confirmacion_ubicacion:
    type: bool
    initial_value: false
    influence_conversation: true
    mappings:
      - type: custom
  ubicacion_confirmada:
    type: bool
    initial_value: false
    influence_conversation: true
    mappings:
      - type: custom
  opciones_negocio:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

responses:
  utter_ask_ubicacion_inicial:
    - text: "👋 ¿Desde dónde sales para tu cita? Así te recomiendo negocios cerca."
  utter_confirmar_ubicacion:
    - text: "📍 He encontrado: **{ubicacion_display}**\n\n¿Es correcta esta ubicación? (Responde **sí** o **no**)"
  utter_pedir_ubicacion_mas_precisa:
    - text: "📍 Por favor, dame tu ubicación de forma más precisa: **Calle, número, municipio, ciudad** (Ejemplo: 'Calle Betis 25, Estepa, Sevilla')"
  utter_saludo_con_ubicacion:
    - text: "✅ Ubicación guardada. Dime qué necesitas (peluquería, dentista, fisio...) y te muestro opciones cerca."
  utter_goodbye:
    - text: "¡Hasta pronto! Vuelve cuando necesites encontrar un negocio."
  utter_fallback:
    - text: "¿Puedes ser más específico? Escribe tu **ciudad y provincia** (ej: Córdoba, Andalucía) o el **tipo de negocio** que buscas (peluquería, dentista, fisio...)."

actions:
  - action_discovery_buscar_negocios

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
