version: "3.1"

intents:
  - greet
  - goodbye
  - informar_ubicacion
  - buscar_negocio
  - afirmar
  - negar
  - nlu_fallback

entities:
  - ubicacion_texto

slots:
  ubicacion_texto:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        intent: informar_ubicacion
      - type: custom
  ubicacion_pendiente_confirmar:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
  esperando_confirmacion_ubicacion:
    type: bool
    initial_value: false
    influence_conversation: true
    mappings:
      - type: custom
  ubicacion_confirmada:
    type: bool
    initial_value: false
    influence_conversation: true
    mappings:
      - type: custom
  ubicacion_confirmada_texto:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
  opciones_negocio:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

responses:
  utter_goodbye:
    - text: "¡Hasta pronto! Vuelve cuando necesites encontrar un negocio."

actions:
  - action_discovery_buscar_negocios

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
