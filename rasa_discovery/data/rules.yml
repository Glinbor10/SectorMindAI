version: "3.1"

rules:
  - rule: Saludar
    steps:
      - intent: greet
      - action: action_discovery_buscar_negocios

  # Cuando el usuario ya está en la conversación, el action decidirá si pedir ubicación o continuar

  - rule: Despedirse
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Guardar ubicación
    steps:
      - intent: informar_ubicacion
      - action: action_discovery_buscar_negocios

  - rule: Buscar negocio
    steps:
      - intent: buscar_negocio
      - action: action_discovery_buscar_negocios

  - rule: Fallback
    steps:
      - intent: nlu_fallback
      - action: action_discovery_buscar_negocios
