<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Sector Mind AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen relative">
    <script>const API_URL = 'http://localhost:5000';</script>

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center cursor-pointer group" onclick="window.location.href='/'">
                    <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center mr-2 relative overflow-hidden transition-transform group-hover:scale-105">
                        <i data-lucide="calendar" class="text-indigo-300 w-6 h-6 absolute opacity-40" stroke-width="1.5"></i>
                        <i data-lucide="brain-circuit" class="text-white w-5 h-5 relative z-10"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-900">Sector Mind AI</span>
                </div>

                <div class="flex items-center space-x-4">
                    <div id="user-menu" class="hidden flex items-center gap-3">
                         <span id="user-name-display" class="font-medium text-slate-700">Usuario</span>
                        <img id="user-avatar-display" src="" class="w-10 h-10 rounded-full border-2 border-indigo-100 object-cover bg-slate-200">
                    </div>
                    <button onclick="logout()" class="text-red-500 hover:text-red-700 font-medium text-sm border border-red-200 px-4 py-2 rounded-lg hover:bg-red-50 transition">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 text-center sticky top-24">
                    <div class="relative inline-block mb-4 group">
                        <img id="profile-img" src="" class="w-32 h-32 rounded-full object-cover border-4 border-slate-50 shadow-lg mx-auto bg-slate-200">
                        <label for="file-input" class="absolute bottom-0 right-0 bg-indigo-600 rounded-full p-2 text-white border-4 border-white cursor-pointer hover:bg-indigo-700 transition shadow-md">
                            <i data-lucide="camera" class="w-4 h-4"></i>
                        </label>
                        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="previewImage(event)">
                    </div>
                    <h2 id="profile-name" class="text-2xl font-bold text-slate-900">Cargando...</h2>
                    <p id="profile-email" class="text-slate-500 text-sm mb-6">cargando@email.com</p>
                    <span id="profile-role" class="px-3 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-bold uppercase tracking-wide">Cliente</span>
                    <hr class="my-6 border-slate-100">
                    <div class="text-left space-y-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase">Nombre Completo</label>
                            <input type="text" id="edit-name" class="w-full mt-1 p-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div id="file-chosen-name" class="text-xs text-indigo-600 font-medium hidden text-center">Nueva imagen seleccionada</div>
                        <button onclick="saveProfileChanges()" class="w-full bg-slate-900 text-white py-2 rounded-lg text-sm font-medium hover:bg-slate-800 transition shadow-lg">Guardar Cambios</button>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-2 space-y-6">
                <div class="flex items-center justify-between gap-3 flex-wrap">
                    <h3 class="text-xl font-bold text-slate-900 flex items-center">
                        <i data-lucide="calendar-check" class="mr-2 text-indigo-600"></i>
                        Mis Citas
                    </h3>
                    <button id="toggle-history" class="text-sm font-medium px-4 py-2 rounded-lg border border-indigo-200 text-indigo-700 bg-indigo-50 hover:bg-indigo-100 transition">
                        Ver histórico
                    </button>
                </div>
                <div id="citas-container" class="space-y-4">
                    <div class="text-center py-12 bg-white rounded-2xl border border-slate-200 border-dashed">
                        <div class="typing-dot w-2 h-2 bg-slate-400 rounded-full inline-block"></div>
                        <p class="text-slate-400 mt-2">Cargando tus reservas...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal de Modificación de Cita -->
    <div id="modal-modify-booking" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b border-slate-200 p-6 flex justify-between items-center">
                <h3 class="text-2xl font-bold text-slate-900">Modificar Cita</h3>
                <button onclick="closeModifyModal()" class="text-slate-400 hover:text-slate-600 transition">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <div class="p-6 space-y-6">
                <div id="modify-service-info" class="bg-indigo-50 p-4 rounded-xl">
                    <p class="text-xs text-indigo-600 font-bold uppercase mb-1">Servicio</p>
                    <p class="text-indigo-900 font-bold"><span id="modify-service-name"></span></p>
                </div>

                <div>
                    <h4 class="font-bold text-slate-900 mb-3">Selecciona nueva fecha</h4>
                    <div id="modify-calendar" class="grid grid-cols-7 gap-2"></div>
                </div>

                <div id="modify-time-section" class="hidden">
                    <h4 class="font-bold text-slate-900 mb-3">Selecciona nueva hora</h4>
                    <div id="modify-time-slots" class="grid grid-cols-3 md:grid-cols-4 gap-2"></div>
                </div>

                <button id="modify-confirm-btn" onclick="confirmModify()" disabled class="w-full bg-slate-300 text-slate-500 py-4 rounded-xl font-bold cursor-not-allowed transition shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5"></i> Selecciona fecha y hora
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let modifyCitaId = null;
        let modifyServicio = null;
        let modifyNegocioId = null;
        let modifySelectedDate = null;
        let modifySelectedTime = null;
        let modifyAvailableDates = {};
        const citasDataMap = new Map(); // Almacenar datos de citas por ID
        let showHistory = false;

        window.onload = async () => {
            const userStr = localStorage.getItem('sector_mind_user');
            if (!userStr) { window.location.href = '/'; return; }
            currentUser = JSON.parse(userStr);
            renderProfileData(currentUser);
            updateUI(); // Cargar navbar
            await refreshUserData();
            loadMyCitations();
            
            const toggleBtn = document.getElementById('toggle-history');
            toggleBtn.addEventListener('click', () => {
                showHistory = !showHistory;
                toggleBtn.textContent = showHistory ? 'Ver próximas' : 'Ver histórico';
                loadMyCitations();
            });
            
            lucide.createIcons();
        };

        function updateUI() {
            // Actualizar navbar con datos actuales
            document.getElementById('user-menu').classList.remove('hidden');
            document.getElementById('user-menu').classList.add('flex');
            document.getElementById('user-name-display').innerText = currentUser.nombre;
            const avatar = currentUser.foto_perfil_url ? currentUser.foto_perfil_url : `https://ui-avatars.com/api/?name=${currentUser.nombre}&background=random`;
            document.getElementById('user-avatar-display').src = avatar;
        }

        function renderProfileData(user) {
            document.getElementById('profile-name').innerText = user.nombre;
            document.getElementById('profile-email').innerText = user.email;
            document.getElementById('profile-role').innerText = user.rol;
            document.getElementById('edit-name').value = user.nombre;
            const avatar = user.foto_perfil_url ? user.foto_perfil_url : `https://ui-avatars.com/api/?name=${user.nombre}&background=random`;
            document.getElementById('profile-img').src = avatar;
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profile-img').src = e.target.result;
                    document.getElementById('file-chosen-name').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        async function refreshUserData() {
            try {
                const res = await fetch(`${API_URL}/usuarios/${currentUser.id}`);
                if (res.ok) {
                    const freshData = await res.json();
                    currentUser = { ...currentUser, ...freshData };
                    localStorage.setItem('sector_mind_user', JSON.stringify(currentUser));
                    renderProfileData(currentUser);
                    updateUI();
                } else if(res.status === 404) {
                    Swal.fire('Sesión caducada', 'Tu usuario ya no existe.', 'error').then(logout);
                }
            } catch (e) { console.error("Error actualizando perfil", e); }
        }

        async function loadMyCitations() {
            const container = document.getElementById('citas-container');
            try {
                const res = await fetch(`${API_URL}/citas?cliente_id=${currentUser.id}`);
                const allCitas = await res.json();
                
                const ahora = new Date();
                const esCancelada = c => c.estado === 'cancelada' || c.estado === 'cancelado';
                const esConfirmada = c => c.estado === 'confirmada';

                const futurasConfirmadas = allCitas.filter(c => esConfirmada(c) && new Date(c.fecha_hora_cita) >= ahora);
                const pasadasConfirmadas = allCitas.filter(c => esConfirmada(c) && new Date(c.fecha_hora_cita) < ahora);
                const canceladas = allCitas.filter(c => esCancelada(c));

                futurasConfirmadas.sort((a, b) => new Date(a.fecha_hora_cita) - new Date(b.fecha_hora_cita));
                pasadasConfirmadas.sort((a, b) => new Date(b.fecha_hora_cita) - new Date(a.fecha_hora_cita));
                canceladas.sort((a, b) => new Date(b.fecha_hora_cita) - new Date(a.fecha_hora_cita));

                let citas = [];
                if (showHistory) {
                    citas = [...futurasConfirmadas, ...pasadasConfirmadas, ...canceladas];
                } else {
                    citas = futurasConfirmadas;
                }
                
                container.innerHTML = '';
                if (citas.length === 0) {
                    const mensaje = showHistory ? 'No hay histórico de citas.' : 'No tienes citas pendientes.';
                    container.innerHTML = `<div class="text-center py-10 bg-white rounded-2xl border border-slate-100"><i data-lucide="coffee" class="w-10 h-10 text-slate-300 mx-auto mb-2"></i><p class="text-slate-500">${mensaje}</p><a href="/" class="text-indigo-600 font-bold text-sm hover:underline mt-2 block">Reservar ahora</a></div>`;
                } else {
                    citas.forEach(cita => {
                        // Guardar datos de la cita en el Map
                        citasDataMap.set(cita.id, {
                            negocioId: cita.negocio_id,
                            servicio: {
                                id: cita.servicio_id,
                                nombre: cita.servicio_nombre,
                                precio: cita.precio,
                                duracion_minutos: cita.duracion_minutos
                            }
                        });
                        
                        const dateObj = new Date(cita.fecha_hora_cita);
                        const isPast = dateObj < ahora;
                        const fechaStr = dateObj.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
                        const horaStr = dateObj.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                        const estadoColor = cita.estado === 'confirmada' ? (isPast ? 'slate' : 'green') : (cita.estado === 'cancelada' || cita.estado === 'cancelado') ? 'red' : 'yellow';
                        const estadoTexto = cita.estado === 'confirmada' ? (isPast ? 'Finalizada' : 'Confirmada') : (cita.estado === 'cancelada' || cita.estado === 'cancelado') ? 'Cancelada' : 'Pendiente';
                        
                        const card = document.createElement('div');
                        card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition";
                        card.innerHTML = `
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <div class="bg-indigo-50 p-3 rounded-xl text-indigo-600 text-center min-w-[60px]">
                                        <span class="block text-xl font-bold">${dateObj.getDate()}</span>
                                        <span class="text-xs uppercase font-bold">${dateObj.toLocaleDateString('es-ES',{month:'short'})}</span>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-slate-900 text-lg">${cita.negocio_nombre}</h4>
                                        <p class="text-slate-500 text-sm flex items-center gap-2">
                                            <i data-lucide="scissors" class="w-3 h-3"></i> ${cita.servicio_nombre} 
                                            <span class="text-slate-300">|</span> 
                                            <i data-lucide="clock" class="w-3 h-3"></i> ${horaStr}
                                        </p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="block text-lg font-bold text-slate-800">${cita.precio}€</span>
                                    <span class="inline-block px-2 py-1 bg-${estadoColor}-100 text-${estadoColor}-700 text-xs rounded-md font-bold uppercase mt-1">${estadoTexto}</span>
                                </div>
                            </div>
                            ${(cita.estado !== 'cancelada' && cita.estado !== 'cancelado' && !isPast) ? `
                            <div class="flex gap-2 mt-4 pt-4 border-t border-slate-100">
                                <button data-cita-id="${cita.id}" class="btn-modificar flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 px-4 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2">
                                    <i data-lucide="edit" class="w-4 h-4"></i> Modificar
                                </button>
                                <button onclick="cancelarCita(${cita.id})" class="flex-1 bg-red-50 hover:bg-red-100 text-red-600 py-2 px-4 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2">
                                    <i data-lucide="x-circle" class="w-4 h-4"></i> Cancelar
                                </button>
                            </div>
                            ` : ''}
                        `;
                        container.appendChild(card);
                    });
                    
                    // Añadir event listeners a botones de modificar
                    document.querySelectorAll('.btn-modificar').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const citaId = parseInt(this.dataset.citaId);
                            const citaData = citasDataMap.get(citaId);
                            if (citaData) {
                                modificarCita(citaId, citaData.negocioId, citaData.servicio);
                            }
                        });
                    });
                }
                lucide.createIcons();
            } catch (err) { container.innerHTML = '<p class="text-red-500">Error al cargar citas.</p>'; }
        }

        async function cancelarCita(citaId) {
            const result = await Swal.fire({
                title: '¿Cancelar cita?',
                text: 'Esta acción no se puede deshacer',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Sí, cancelar',
                cancelButtonText: 'No, mantener'
            });

            if (result.isConfirmed) {
                try {
                    const res = await fetch(`${API_URL}/citas/${citaId}`, { method: 'DELETE' });
                    if (res.ok) {
                        Swal.fire({
                            title: 'Cita Cancelada',
                            text: 'Tu cita ha sido cancelada correctamente',
                            icon: 'success',
                            confirmButtonColor: '#4f46e5'
                        });
                        loadMyCitations(); // Recargar lista
                    } else {
                        const data = await res.json();
                        Swal.fire('Error', data.error, 'error');
                    }
                } catch (err) {
                    Swal.fire('Error', 'Error de conexión', 'error');
                }
            }
        }

        async function modificarCita(citaId, negocioId, servicioData) {
            try {
                console.log('📝 modificarCita llamada con:', { citaId, negocioId, servicioData });
                
                // Inicializar variables
                modifyCitaId = citaId;
                modifyServicio = servicioData;
                modifyNegocioId = negocioId;
                modifySelectedDate = null;
                modifySelectedTime = null;
                modifyAvailableDates = {};

                console.log('✅ Variables inicializadas:', { modifyCitaId, modifyNegocioId, modifyServicio });

                // Mostrar servicio actual
                document.getElementById('modify-service-name').textContent = `${servicioData.nombre} - ${servicioData.precio}€ (${servicioData.duracion_minutos} min)`;
                
                // Ocultar sección de horarios
                document.getElementById('modify-time-section').classList.add('hidden');
                document.getElementById('modify-time-slots').innerHTML = '';
                
                // Deshabilitar botón
                const confirmBtn = document.getElementById('modify-confirm-btn');
                confirmBtn.disabled = true;
                confirmBtn.className = "w-full bg-slate-300 text-slate-500 py-4 rounded-xl font-bold cursor-not-allowed transition shadow-lg flex items-center justify-center gap-2";
                
                // Mostrar modal
                document.getElementById('modal-modify-booking').classList.remove('hidden');
                
                // Cargar calendario
                await loadModifyCalendar();
                lucide.createIcons();
                
            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'No se pudieron cargar los datos', 'error');
            }
        }

        function closeModifyModal() {
            document.getElementById('modal-modify-booking').classList.add('hidden');
            modifyCitaId = null;
            modifyServicio = null;
            modifyNegocioId = null;
            modifySelectedDate = null;
            modifySelectedTime = null;
            modifyAvailableDates = {};
        }

        async function loadModifyCalendar() {
            const calendarContainer = document.getElementById('modify-calendar');
            calendarContainer.innerHTML = '<div class="col-span-7 text-center py-8"><div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div><p class="text-slate-500 mt-3">Cargando días disponibles...</p></div>';
            
            const today = new Date();
            const daysToShow = 21;
            
            const disponibilidadPromises = [];
            for (let i = 0; i < daysToShow; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                disponibilidadPromises.push(
                    fetch(`${API_URL}/disponibilidad`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            negocio_id: modifyNegocioId,
                            servicio_id: modifyServicio.id,
                            fecha: dateStr
                        })
                    })
                        .then(res => res.json())
                        .then(data => {
                            const horarios = data.disponibles || [];
                            return { date: dateStr, hasSlots: horarios.length > 0, horarios };
                        })
                        .catch(() => ({ date: dateStr, hasSlots: false, horarios: [] }))
                );
            }
            
            const results = await Promise.all(disponibilidadPromises);
            
            results.forEach(result => {
                if (result.hasSlots) {
                    modifyAvailableDates[result.date] = result.horarios;
                }
            });
            
            calendarContainer.innerHTML = '';
            
            const dayHeaders = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            dayHeaders.forEach(day => {
                const header = document.createElement('div');
                header.className = 'text-center text-xs font-bold text-slate-400 py-2';
                header.textContent = day;
                calendarContainer.appendChild(header);
            });
            
            const firstDate = new Date(today);
            const firstDayOfWeek = firstDate.getDay();
            for (let i = 0; i < firstDayOfWeek; i++) {
                const emptyCell = document.createElement('div');
                calendarContainer.appendChild(emptyCell);
            }
            
            results.forEach(result => {
                const date = new Date(result.date);
                const dayButton = document.createElement('button');
                dayButton.type = 'button';
                dayButton.className = result.hasSlots 
                    ? 'p-3 rounded-lg border-2 border-green-200 bg-green-50 hover:border-green-500 hover:bg-green-100 transition text-sm font-medium text-green-700 hover:text-green-900'
                    : 'p-3 rounded-lg border border-slate-100 bg-slate-50 text-slate-300 cursor-not-allowed';
                
                const dayNum = date.getDate();
                const monthShort = date.toLocaleDateString('es-ES', { month: 'short' });
                
                dayButton.innerHTML = `<div class="text-lg font-bold">${dayNum}</div><div class="text-xs">${monthShort}</div>`;
                
                if (result.hasSlots) {
                    dayButton.onclick = () => selectModifyDate(result.date, dayButton);
                } else {
                    dayButton.disabled = true;
                }
                
                calendarContainer.appendChild(dayButton);
            });
        }

        function selectModifyDate(dateStr, buttonElement) {
            document.querySelectorAll('#modify-calendar button').forEach(btn => {
                if (btn.className.includes('green')) {
                    btn.className = 'p-3 rounded-lg border-2 border-green-200 bg-green-50 hover:border-green-500 hover:bg-green-100 transition text-sm font-medium text-green-700 hover:text-green-900';
                }
            });
            
            buttonElement.className = 'p-3 rounded-lg border-2 border-indigo-600 bg-indigo-600 text-white transition text-sm font-bold shadow-md';
            
            modifySelectedDate = dateStr;
            modifySelectedTime = null;
            
            const timeSlotsContainer = document.getElementById('modify-time-slots');
            const timeSection = document.getElementById('modify-time-section');
            
            timeSection.classList.remove('hidden');
            timeSlotsContainer.innerHTML = '';
            
            const horarios = modifyAvailableDates[dateStr] || [];
            
            if (horarios.length === 0) {
                timeSlotsContainer.innerHTML = '<div class="col-span-full text-center py-4 text-slate-400">No hay horarios disponibles</div>';
                updateModifyButton();
                return;
            }
            
            horarios.forEach(hora => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = "p-3 border-2 border-slate-200 rounded-lg hover:border-indigo-500 hover:bg-indigo-50 transition text-sm font-medium text-slate-700 hover:text-indigo-700";
                button.textContent = new Date(hora).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                button.onclick = () => selectModifyTime(hora, button);
                timeSlotsContainer.appendChild(button);
            });
            
            updateModifyButton();
            lucide.createIcons();
        }

        function selectModifyTime(hora, buttonElement) {
            document.querySelectorAll('#modify-time-slots button').forEach(btn => {
                btn.className = "p-3 border-2 border-slate-200 rounded-lg hover:border-indigo-500 hover:bg-indigo-50 transition text-sm font-medium text-slate-700 hover:text-indigo-700";
            });
            
            buttonElement.className = "p-3 border-2 border-indigo-600 bg-indigo-600 rounded-lg text-white font-bold text-sm shadow-md";
            
            modifySelectedTime = hora;
            updateModifyButton();
        }

        function updateModifyButton() {
            const confirmBtn = document.getElementById('modify-confirm-btn');
            
            if (modifySelectedDate && modifySelectedTime) {
                confirmBtn.disabled = false;
                confirmBtn.className = "w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-xl font-bold transition shadow-lg hover:shadow-xl flex items-center justify-center gap-2";
                confirmBtn.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5"></i> Confirmar Cambios';
                lucide.createIcons();
            } else {
                confirmBtn.disabled = true;
                confirmBtn.className = "w-full bg-slate-300 text-slate-500 py-4 rounded-xl font-bold cursor-not-allowed transition shadow-lg flex items-center justify-center gap-2";
                confirmBtn.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5"></i> Selecciona fecha y hora';
                lucide.createIcons();
            }
        }

        async function confirmModify() {
            if (!modifyServicio || !modifySelectedDate || !modifySelectedTime || !modifyCitaId) return;
            
            const fecha_hora_cita = modifySelectedTime;
            
            try {
                const response = await fetch(`${API_URL}/citas/${modifyCitaId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        servicio_id: modifyServicio.id,
                        fecha_hora_cita: fecha_hora_cita
                    })
                });
                
                if (response.ok) {
                    const servicioInfo = {
                        nombre: modifyServicio.nombre,
                        precio: modifyServicio.precio,
                        duracion_minutos: modifyServicio.duracion_minutos
                    };
                    
                    closeModifyModal();
                    
                    const dateObj = new Date(fecha_hora_cita);
                    const fechaLegible = dateObj.toLocaleDateString('es-ES', { 
                        weekday: 'long', 
                        year: 'numeric', 
                        month: 'long', 
                        day: 'numeric' 
                    });
                    const horaLegible = dateObj.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                    
                    await Swal.fire({
                        icon: 'success',
                        title: '¡Cita Modificada!',
                        html: `
                            <div class="text-center">
                                <p class="text-lg mb-4">Tu cita ha sido reprogramada</p>
                                <div class="bg-indigo-50 p-6 rounded-xl">
                                    <p class="text-sm text-indigo-600 font-bold uppercase mb-2">${servicioInfo.nombre}</p>
                                    <p class="text-2xl font-bold text-indigo-900 mb-1">${fechaLegible}</p>
                                    <p class="text-xl text-indigo-700">a las ${horaLegible}</p>
                                    <div class="mt-4 pt-4 border-t border-indigo-200">
                                        <p class="text-indigo-600"><span class="font-bold">${servicioInfo.precio}€</span> • ${servicioInfo.duracion_minutos} minutos</p>
                                    </div>
                                </div>
                            </div>
                        `,
                        confirmButtonText: '¡Perfecto!',
                        confirmButtonColor: '#4f46e5'
                    });
                    
                    loadMyCitations();
                } else {
                    const error = await response.json();
                    Swal.fire({
                        icon: 'error',
                        title: 'Error al modificar',
                        text: error.error || 'No se pudo completar la modificación',
                        confirmButtonColor: '#4f46e5'
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Error de conexión',
                    text: `No se pudo conectar con el servidor: ${error.message}`,
                    confirmButtonColor: '#4f46e5'
                });
            }
        }

        async function saveProfileChanges() {
            const newName = document.getElementById('edit-name').value;
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('nombre', newName);
            if (file) formData.append('foto_perfil', file);

            try {
                const res = await fetch(`${API_URL}/usuarios/${currentUser.id}`, { method: 'PUT', body: formData });
                if (res.ok) {
                    Swal.fire({
                        title: 'Sector Mind AI',
                        text: 'Perfil actualizado correctamente',
                        icon: 'success',
                        confirmButtonColor: '#4f46e5'
                    });
                    document.getElementById('file-chosen-name').classList.add('hidden');
                    fileInput.value = "";
                    await refreshUserData(); 
                } else {
                    const data = await res.json();
                    Swal.fire('Error', data.error, 'error');
                }
            } catch (e) { Swal.fire('Error', 'Error de conexión', 'error'); }
        }

        function logout() { localStorage.removeItem('sector_mind_user'); window.location.href = '/'; }
    </script>
</body>
</html>
