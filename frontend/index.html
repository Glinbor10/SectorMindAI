<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sector Mind AI - Plataforma de Reservas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }
        .filter-btn.active { background-color: #4f46e5; color: white; border-color: #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen relative">

    <script>
        const API_URL = 'http://localhost:5000';
        let currentUser = null;
        let allNegocios = []; 
        let currentCategory = 'Todos';
        let currentSearchTerm = '';
    </script>

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center cursor-pointer group" onclick="window.location.href='/'">
                    <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center mr-2 relative overflow-hidden transition-transform group-hover:scale-105">
                        <i data-lucide="calendar" class="text-indigo-300 w-6 h-6 absolute opacity-40" stroke-width="1.5"></i>
                        <i data-lucide="brain-circuit" class="text-white w-5 h-5 relative z-10"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-900">Sector Mind AI</span>
                </div>

                <div class="flex items-center space-x-4">
                    <div id="auth-buttons" class="flex items-center space-x-3">
                        <button onclick="openModal('modal-login')" class="text-slate-600 hover:text-indigo-600 font-medium transition-colors">Iniciar Sesión</button>
                        <button onclick="openModal('modal-register')" class="bg-indigo-600 text-white px-5 py-2 rounded-full font-medium hover:bg-indigo-700 transition-shadow shadow-lg shadow-indigo-200">Registrarse</button>
                    </div>

                    <div id="user-menu" class="hidden flex items-center gap-3 cursor-pointer" onclick="window.location.href='/perfil.html'">
                        <span id="user-name-display" class="font-medium text-slate-700">Usuario</span>
                        <img id="user-avatar-display" src="" class="w-10 h-10 rounded-full border-2 border-indigo-100 object-cover bg-slate-200">
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <header class="relative pt-16 pb-20 lg:pt-24 lg:pb-28 overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight text-slate-900 mb-6">
                Tu tiempo, <span class="text-indigo-600">mejor invertido.</span>
            </h1>
            <p class="mt-4 max-w-2xl mx-auto text-xl text-slate-500 mb-10">
                Reserva citas en tus negocios favoritos con nuestra IA conversacional.
            </p>
            <div class="max-w-xl mx-auto relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-2xl blur opacity-25 group-hover:opacity-40 transition duration-200"></div>
                <div class="relative bg-white rounded-2xl shadow-xl flex items-center p-2 border border-slate-100">
                    <i data-lucide="search" class="ml-4 text-slate-400 w-5 h-5"></i>
                    <input type="text" id="search-input" placeholder="Buscar..." class="w-full p-3 outline-none text-slate-700 placeholder:text-slate-400 bg-transparent text-lg">
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full flex-grow">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <h2 class="text-2xl font-bold text-slate-900">Negocios Destacados</h2>
            <div id="filters-container" class="flex flex-wrap gap-2"></div>
        </div>
        <div id="business-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20"><p class="text-slate-500">Cargando...</p></div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 text-sm">
            &copy; 2025 Sector Mind AI.
        </div>
    </footer>

    <div id="modal-login" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 relative mx-4">
            <button onclick="closeModal('modal-login')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Bienvenido</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="login-email" required placeholder="Email" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                <input type="password" id="login-password" required placeholder="Contraseña" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700">Entrar</button>
            </form>
        </div>
    </div>

    <div id="modal-register" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 relative mx-4">
            <button onclick="closeModal('modal-register')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Crear cuenta</h2>
            <form onsubmit="handleRegister(event)" class="space-y-4">
                <input type="text" id="reg-name" required placeholder="Nombre Completo" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                <input type="email" id="reg-email" required placeholder="Email" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                <input type="password" id="reg-password" required placeholder="Contraseña" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1 ml-1">Foto de perfil (Opcional)</label>
                    <input type="file" id="reg-photo-file" accept="image/*" class="w-full p-2 border border-slate-300 rounded-xl text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>
                <select id="reg-rol" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                    <option value="cliente">Cliente (Quiero reservar)</option>
                    <option value="propietario">Dueño de Negocio</option>
                </select>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700">Registrarse</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    saveUserSession(data);
                    closeModal('modal-login');
                    Swal.fire({ title: 'Sector Mind AI', text: `Bienvenido de nuevo, ${data.nombre}`, icon: 'success', confirmButtonColor: '#4f46e5' });
                } else { Swal.fire('Error', data.error, 'error'); }
            } catch (err) { Swal.fire('Error', 'Error de conexión', 'error'); }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('nombre', document.getElementById('reg-name').value);
            formData.append('email', document.getElementById('reg-email').value);
            formData.append('password', document.getElementById('reg-password').value);
            formData.append('rol', document.getElementById('reg-rol').value);
            const fileInput = document.getElementById('reg-photo-file');
            if(fileInput.files[0]) formData.append('foto_perfil', fileInput.files[0]);

            try {
                const res = await fetch(`${API_URL}/auth/register`, { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    saveUserSession(data);
                    closeModal('modal-register');
                    Swal.fire({ title: 'Sector Mind AI', text: `¡Cuenta creada! Bienvenido, ${data.nombre}`, icon: 'success', confirmButtonColor: '#4f46e5' });
                } else { Swal.fire('Error', data.error, 'error'); }
            } catch (err) { Swal.fire('Error', 'Error al registrarse', 'error'); }
        }

        function saveUserSession(userData) {
            localStorage.setItem('sector_mind_user', JSON.stringify(userData));
            currentUser = userData;
            updateUI();
        }

        function updateUI() {
            const userStr = localStorage.getItem('sector_mind_user');
            if (userStr) {
                currentUser = JSON.parse(userStr);
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-menu').classList.remove('hidden');
                document.getElementById('user-menu').classList.add('flex');
                document.getElementById('user-name-display').innerText = currentUser.nombre;
                document.getElementById('user-avatar-display').src = currentUser.foto_perfil_url || `https://ui-avatars.com/api/?name=${currentUser.nombre}&background=random`;
            } else {
                document.getElementById('auth-buttons').classList.remove('hidden');
                document.getElementById('user-menu').classList.add('hidden');
                document.getElementById('user-menu').classList.remove('flex');
            }
        }

        async function loadBusinesses() {
            const grid = document.getElementById('business-grid');
            try {
                const res = await fetch(`${API_URL}/negocios/`);
                allNegocios = await res.json();
                if(allNegocios.length === 0) {
                    grid.innerHTML = '<p class="text-center col-span-full text-slate-500">No hay negocios.</p>';
                    return;
                }
                generateFilters(allNegocios);
                renderBusinessGrid(allNegocios);
            } catch (err) { grid.innerHTML = '<p class="text-red-500 col-span-full">Error al conectar.</p>'; }
        }

        function generateFilters(negocios) {
            const container = document.getElementById('filters-container');
            const types = ['Todos', ...new Set(negocios.map(n => capitalize(n.tipo_negocio)))];
            container.innerHTML = '';
            types.forEach(type => {
                const btn = document.createElement('button');
                btn.className = `filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-200 transition-colors duration-200 hover:bg-slate-100 ${type === 'Todos' ? 'active' : 'bg-white text-slate-600'}`;
                btn.innerText = type;
                btn.onclick = () => setFilter(type, btn);
                container.appendChild(btn);
            });
        }

        function setFilter(type, btnElement) {
            currentCategory = type;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('active', 'bg-indigo-600', 'text-white');
                b.classList.add('bg-white', 'text-slate-600');
            });
            btnElement.classList.remove('bg-white', 'text-slate-600');
            btnElement.classList.add('active'); 
            applyFilters();
        }

        function applyFilters() {
            const term = currentSearchTerm.toLowerCase();
            const category = currentCategory.toLowerCase();
            const filtered = allNegocios.filter(negocio => {
                const matchesText = negocio.nombre.toLowerCase().includes(term) || 
                                    (negocio.descripcion && negocio.descripcion.toLowerCase().includes(term)) ||
                                    (negocio.tipo_negocio && negocio.tipo_negocio.toLowerCase().includes(term));
                const matchesCategory = category === 'todos' || negocio.tipo_negocio.toLowerCase() === category;
                return matchesText && matchesCategory;
            });
            renderBusinessGrid(filtered);
        }

        function renderBusinessGrid(negociosData) {
            const grid = document.getElementById('business-grid');
            grid.innerHTML = '';
            if (negociosData.length === 0) {
                grid.innerHTML = '<p class="text-center col-span-full text-slate-400 py-10">No hay resultados.</p>';
                return;
            }
            negociosData.forEach(negocio => {
                const fotoBg = negocio.foto_url ? negocio.foto_url : 'https://images.unsplash.com/photo-1521590832896-017c4f98aa51?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80';
                
                const cardLink = document.createElement('a');
                cardLink.className = "group bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden border border-slate-100 cursor-pointer flex flex-col h-full fade-in block text-left";
                
                // --- CAMBIO IMPORTANTE: Enlace al archivo detalle.html ---
                cardLink.href = 'detalle.html'; 
                // --------------------------------------------------------

                cardLink.onclick = () => {
                    localStorage.setItem('selected_business', JSON.stringify(negocio));
                };

                cardLink.innerHTML = `
                    <div class="h-48 overflow-hidden relative">
                        <img src="${fotoBg}" alt="${negocio.nombre}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-indigo-600 shadow-sm capitalize">${negocio.tipo_negocio}</div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="text-xl font-bold text-slate-900 mb-2">${negocio.nombre}</h3>
                        <p class="text-slate-500 text-sm line-clamp-2 mb-4 flex-grow">${negocio.descripcion || 'Sin descripción.'}</p>
                        <div class="flex items-center text-slate-400 text-xs pt-4 border-t border-slate-100 mt-auto">
                            <i data-lucide="map-pin" class="w-4 h-4 mr-1"></i>
                            <span>${negocio.direccion || 'Ubicación no especificada'}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(cardLink);
            });
            lucide.createIcons();
        }

        function capitalize(str) { return str ? str.charAt(0).toUpperCase() + str.slice(1) : ''; }

        document.getElementById('search-input').addEventListener('input', (e) => {
            currentSearchTerm = e.target.value;
            applyFilters();
        });

        window.onload = () => {
            updateUI();
            loadBusinesses();
            lucide.createIcons();
        };
    </script>
</body>
</html>
