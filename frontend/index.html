<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sector Mind AI - Plataforma de Reservas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen relative">

    <!-- NAV BAR -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center cursor-pointer" onclick="window.location.href='/'">
                    <div class="bg-indigo-600 p-2 rounded-lg mr-3">
                        <i data-lucide="brain-circuit" class="h-6 w-6 text-white"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-900">Sector Mind AI</span>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div id="auth-buttons" class="flex gap-2">
                        <button onclick="openAuthModal('login')" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-indigo-600 transition">Iniciar Sesión</button>
                        <button onclick="openAuthModal('register')" class="px-4 py-2 rounded-full bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800 transition shadow-lg shadow-indigo-500/20">Registrarse</button>
                    </div>
                    <div id="user-profile" class="hidden items-center gap-3">
                        <div class="text-right">
                            <p class="text-sm font-bold text-slate-900" id="user-name-display">Usuario</p>
                            <p class="text-xs text-slate-500 capitalize" id="user-role-display">Cliente</p>
                        </div>
                        <div class="h-9 w-9 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-bold border border-indigo-200">
                            <i data-lucide="user"></i>
                        </div>
                        <button onclick="logout()" class="text-xs text-red-500 hover:text-red-700 ml-2 font-medium border border-red-100 rounded px-2 py-1 bg-red-50">Salir</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- ========================================= -->
    <!-- VISTA CLIENTE (Buscador y Lista Global) -->
    <!-- ========================================= -->
    <div id="view-client" class="flex-grow flex flex-col">
        <header class="bg-white border-b border-slate-100 relative overflow-hidden">
            <div class="max-w-7xl mx-auto py-12 px-4 text-center relative z-10">
                <span class="inline-block py-1 px-3 rounded-full bg-indigo-50 text-indigo-600 text-xs font-bold uppercase tracking-wider mb-4 border border-indigo-100">
                    Reserva Inteligente v2.0
                </span>
                <h1 class="text-3xl font-extrabold text-slate-900 sm:text-5xl mb-4 leading-tight">
                    Encuentra y reserva <br>
                    <span class="text-indigo-600">tu servicio ideal.</span>
                </h1>
            </div>
        </header>

        <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="relative w-full md:w-1/2">
                    <i data-lucide="search" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                    <input type="text" id="search-input" oninput="filterBusinesses()" placeholder="Buscar negocio (ej: Peluquería Estilo...)" class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                <div class="flex items-center gap-2 w-full md:w-auto">
                    <i data-lucide="filter" class="text-slate-400 w-5 h-5"></i>
                    <select id="type-filter" onchange="filterBusinesses()" class="w-full md:w-48 p-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white cursor-pointer">
                        <option value="">Todos los tipos</option>
                        <option value="peluqueria">💇 Peluquerías</option>
                        <option value="dentista">🦷 Dentistas</option>
                        <option value="fisioterapia">🦴 Fisioterapia</option>
                    </select>
                </div>
            </div>

            <div id="negocios-container" class="grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-3"></div>
            <div id="no-results" class="hidden text-center py-12">
                <p class="text-slate-500 font-medium">No encontramos negocios.</p>
            </div>
        </main>
    </div>

    <!-- ========================================= -->
    <!-- VISTA PROPIETARIO (Gestión) -->
    <!-- ========================================= -->
    <div id="view-owner" class="hidden flex-grow bg-slate-50 p-4 md:p-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-slate-900">Mis Negocios</h2>
                    <p class="text-slate-500">Gestiona tus locales y servicios</p>
                </div>
                <button onclick="openCreateBusinessModal()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-indigo-700 transition flex items-center shadow-lg shadow-indigo-200">
                    <i data-lucide="plus" class="w-5 h-5 mr-2"></i> Nuevo Negocio
                </button>
            </div>

            <div id="owner-businesses-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Se llena con JS -->
            </div>
            
            <div id="owner-empty-state" class="hidden text-center py-16 bg-white rounded-3xl border border-dashed border-slate-300">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400">
                    <i data-lucide="store" class="w-8 h-8"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-900">Aún no tienes negocios</h3>
                <p class="text-slate-500 mb-4">Crea tu primer negocio para empezar a recibir reservas.</p>
                <button onclick="openCreateBusinessModal()" class="text-indigo-600 font-bold hover:underline">Crear ahora</button>
            </div>
        </div>
    </div>

    <!-- MODAL AUTH -->
    <div id="auth-modal" class="fixed inset-0 z-50 hidden bg-slate-900/50 backdrop-blur-sm flex items-center justify-center fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 relative">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            <div class="flex border-b border-slate-200 mb-6">
                <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2 text-center font-medium border-b-2 border-indigo-600 text-indigo-600">Iniciar Sesión</button>
                <button id="tab-register" onclick="switchTab('register')" class="flex-1 py-2 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700">Registrarse</button>
            </div>
            <form id="form-login" onsubmit="handleLoginSubmit(event)" class="space-y-4">
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Email</label><input type="email" id="login-email" required class="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-indigo-500"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label><input type="password" id="login-pass" required class="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-indigo-500"></div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold hover:bg-indigo-700 transition">Entrar</button>
            </form>
            <form id="form-register" onsubmit="handleRegisterSubmit(event)" class="space-y-4 hidden">
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Nombre</label><input type="text" id="reg-name" required class="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-indigo-500"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Email</label><input type="email" id="reg-email" required class="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-indigo-500"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label><input type="password" id="reg-pass" required class="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-indigo-500"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Rol</label><div class="grid grid-cols-2 gap-2"><label class="cursor-pointer border rounded-lg p-2 text-center hover:bg-slate-50 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50 has-[:checked]:text-indigo-700 transition"><input type="radio" name="role" value="cliente" checked class="hidden"><span class="text-sm font-medium">Cliente</span></label><label class="cursor-pointer border rounded-lg p-2 text-center hover:bg-slate-50 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50 has-[:checked]:text-indigo-700 transition"><input type="radio" name="role" value="propietario" class="hidden"><span class="text-sm font-medium">Propietario</span></label></div></div>
                <button type="submit" class="w-full bg-slate-900 text-white py-2 rounded-lg font-bold hover:bg-slate-800 transition">Crear Cuenta</button>
            </form>
            <div id="auth-error" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center text-red-700 text-sm"><span id="auth-error-text">Error</span></div>
        </div>
    </div>

    <!-- MODAL CREAR NEGOCIO -->
    <div id="modal-create-business" class="fixed inset-0 z-50 hidden bg-slate-900/50 backdrop-blur-sm flex items-center justify-center fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8 relative max-h-[90vh] overflow-y-auto">
            <button onclick="document.getElementById('modal-create-business').classList.add('hidden')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            <h2 class="text-2xl font-bold mb-4">Nuevo Negocio</h2>
            <form onsubmit="handleCreateBusiness(event)" class="space-y-4">
                <div><label class="block text-sm font-medium mb-1">Nombre</label><input type="text" id="new-biz-name" required class="w-full border rounded-lg px-3 py-2"></div>
                <div><label class="block text-sm font-medium mb-1">Tipo</label><select id="new-biz-type" class="w-full border rounded-lg px-3 py-2"><option value="peluqueria">Peluquería</option><option value="dentista">Dentista</option><option value="fisioterapia">Fisioterapia</option></select></div>
                <div><label class="block text-sm font-medium mb-1">Dirección</label><input type="text" id="new-biz-address" required class="w-full border rounded-lg px-3 py-2"></div>
                <div><label class="block text-sm font-medium mb-1">Descripción</label><textarea id="new-biz-desc" rows="3" class="w-full border rounded-lg px-3 py-2"></textarea></div>
                <div><label class="block text-sm font-medium mb-1">Foto URL (Opcional)</label><input type="url" id="new-biz-photo" class="w-full border rounded-lg px-3 py-2" placeholder="https://..."></div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold hover:bg-indigo-700">Crear Negocio</button>
            </form>
        </div>
    </div>

    <!-- MODAL AÑADIR SERVICIO -->
    <div id="modal-add-service" class="fixed inset-0 z-50 hidden bg-slate-900/50 backdrop-blur-sm flex items-center justify-center fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 relative">
            <button onclick="document.getElementById('modal-add-service').classList.add('hidden')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            <h2 class="text-xl font-bold mb-4">Añadir Servicio</h2>
            <p id="service-modal-biz-name" class="text-sm text-slate-500 mb-4">...</p>
            <form onsubmit="handleAddService(event)" class="space-y-4">
                <input type="hidden" id="service-biz-id">
                <div><label class="block text-sm font-medium mb-1">Nombre</label><input type="text" id="new-service-name" required class="w-full border rounded-lg px-3 py-2"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium mb-1">Precio (€)</label><input type="number" id="new-service-price" step="0.01" required class="w-full border rounded-lg px-3 py-2"></div>
                    <div><label class="block text-sm font-medium mb-1">Minutos</label><input type="number" id="new-service-duration" value="30" required class="w-full border rounded-lg px-3 py-2"></div>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-lg font-bold hover:bg-emerald-700">Guardar</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';
        let currentUser = null;
        let allBusinesses = [];

        // --- AUTH UI ---
        function openAuthModal(t) { document.getElementById('auth-modal').classList.remove('hidden'); switchTab(t); }
        function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('auth-error').classList.add('hidden'); }
        function switchTab(t) {
            const lF=document.getElementById('form-login'), rF=document.getElementById('form-register');
            const lT=document.getElementById('tab-login'), rT=document.getElementById('tab-register');
            if(t==='login'){ lF.classList.remove('hidden'); rF.classList.add('hidden'); lT.className="flex-1 py-2 text-center font-bold border-b-2 border-indigo-600 text-indigo-600"; rT.className="flex-1 py-2 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700"; }
            else { lF.classList.add('hidden'); rF.classList.remove('hidden'); rT.className="flex-1 py-2 text-center font-bold border-b-2 border-indigo-600 text-indigo-600"; lT.className="flex-1 py-2 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700"; }
        }

        // --- AUTH LOGIC (ROBUSTA) ---
        async function performLogin(email, password) {
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (res.ok) {
                    loginSuccess(data);
                } else {
                    showError(data.error || 'Error de acceso');
                }
            } catch (x) { showError('Error de conexión'); }
        }

        async function handleLoginSubmit(e) {
            e.preventDefault();
            await performLogin(document.getElementById('login-email').value, document.getElementById('login-pass').value);
        }

        async function handleRegisterSubmit(e) {
            e.preventDefault();
            const nombre = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;
            const rol = document.querySelector('input[name="role"]:checked').value;

            try {
                const r = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({nombre, email, password, rol})
                });
                if (r.ok) {
                    await performLogin(email, password);
                } else {
                    const d = await r.json();
                    showError(d.error);
                }
            } catch(x) { showError('Error conexión'); }
        }

        function loginSuccess(u){ currentUser=u; localStorage.setItem('sector_mind_user',JSON.stringify(u)); closeAuthModal(); updateUI(); }
        function logout(){ currentUser=null; localStorage.removeItem('sector_mind_user'); location.reload(); }
        function showError(m){ document.getElementById('auth-error').classList.remove('hidden'); document.getElementById('auth-error-text').innerText=m; }
        
        // --- UI STATE MANAGER ---
        function updateUI(){
            const ab=document.getElementById('auth-buttons'), up=document.getElementById('user-profile');
            const vClient=document.getElementById('view-client'), vOwner=document.getElementById('view-owner');
            
            if(currentUser){ 
                ab.classList.add('hidden'); up.classList.remove('hidden'); up.classList.add('flex'); 
                document.getElementById('user-name-display').innerText=currentUser.nombre; 
                document.getElementById('user-role-display').innerText=currentUser.rol;

                // LOGICA DE ROLES
                if(currentUser.rol === 'propietario') {
                    vClient.classList.add('hidden'); 
                    vOwner.classList.remove('hidden');
                    loadOwnerBusinesses(); // Carga panel dueño
                } else {
                    vClient.classList.remove('hidden'); 
                    vOwner.classList.add('hidden');
                    loadBusinesses(); // Carga panel cliente
                }
            } else { 
                ab.classList.remove('hidden'); up.classList.add('hidden');
                vClient.classList.remove('hidden'); vOwner.classList.add('hidden');
                loadBusinesses();
            }
        }

        // --- CLIENT LOGIC ---
        async function loadBusinesses() {
            const c = document.getElementById('negocios-container');
            if(!c) return;
            c.innerHTML = '<p class="text-center col-span-3 py-10">Cargando...</p>';
            try {
                const r = await fetch(`${API_URL}/negocios/`); const d = await r.json(); allBusinesses = d; renderBusinesses(d);
            } catch(e) { c.innerHTML = '<p class="text-red-500 text-center col-span-3">Error Backend</p>'; }
        }
        function renderBusinesses(list) {
            const c = document.getElementById('negocios-container'); const no = document.getElementById('no-results'); c.innerHTML='';
            if(list.length===0){c.classList.add('hidden');no.classList.remove('hidden');return;} else{c.classList.remove('hidden');no.classList.add('hidden');}
            list.forEach(n => {
                let img = n.foto_url && n.foto_url.startsWith('http') ? n.foto_url : `https://source.unsplash.com/600x400/?${n.tipo_negocio==='peluqueria'?'hair-salon':'office'}`;
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition duration-300 cursor-pointer group h-full flex flex-col';
                card.onclick = () => window.location.href=`/negocio?id=${n.id}`;
                card.innerHTML = `<div class="h-48 overflow-hidden relative"><img src="${img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500"><div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-slate-800 uppercase tracking-wide shadow-sm">${n.tipo_negocio}</div></div><div class="p-6 flex-grow flex flex-col"><h3 class="text-xl font-bold text-slate-900 mb-1 group-hover:text-indigo-600 transition">${n.nombre}</h3><p class="text-sm text-slate-500 mb-4 line-clamp-2 flex-grow">${n.descripcion || 'Sin descripción'}</p><div class="flex items-center text-xs text-slate-400 mt-auto pt-4 border-t border-slate-50"><i data-lucide="user" class="w-3 h-3 mr-1"></i><span>${n.propietario_nombre || 'Anónimo'}</span></div></div>`;
                c.appendChild(card);
            });
            lucide.createIcons();
        }
        function filterBusinesses() {
            const txt = document.getElementById('search-input').value.toLowerCase();
            const type = document.getElementById('type-filter').value;
            const res = allBusinesses.filter(n => n.nombre.toLowerCase().includes(txt) && (type==="" || n.tipo_negocio===type));
            renderBusinesses(res);
        }
        function resetFilters() { document.getElementById('search-input').value = ''; document.getElementById('type-filter').value = ''; renderBusinesses(allBusinesses); }

        // --- OWNER LOGIC ---
        async function loadOwnerBusinesses() {
            const c = document.getElementById('owner-businesses-container');
            const empty = document.getElementById('owner-empty-state');
            c.innerHTML = '<p class="col-span-full text-center">Cargando tus negocios...</p>';
            try {
                const r = await fetch(`${API_URL}/negocios/?propietario_id=${currentUser.id}`);
                const data = await r.json();
                c.innerHTML = '';
                
                if(data.length === 0) { c.classList.add('hidden'); empty.classList.remove('hidden'); return; }
                else { c.classList.remove('hidden'); empty.classList.add('hidden'); }

                data.forEach(n => {
                    let img = n.foto_url && n.foto_url.startsWith('http') ? n.foto_url : `https://source.unsplash.com/600x400/?${n.tipo_negocio==='peluqueria'?'hair-salon':'office'}`;
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col';
                    card.innerHTML = `
                        <div class="h-40 overflow-hidden relative"><img src="${img}" class="w-full h-full object-cover"></div>
                        <div class="p-6 flex-grow">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-xl font-bold text-slate-900">${n.nombre}</h3>
                                <span class="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded font-bold uppercase">${n.tipo_negocio}</span>
                            </div>
                            <p class="text-sm text-slate-500 mb-4 line-clamp-2">${n.direccion}</p>
                            <div class="border-t pt-4 mt-auto grid grid-cols-2 gap-2">
                                <button onclick="window.location.href='/negocio?id=${n.id}'" class="py-2 text-sm font-medium text-slate-600 hover:text-indigo-600 border rounded-lg hover:border-indigo-600 transition">Ver Público</button>
                                <button onclick="openAddServiceModal(${n.id}, '${n.nombre}')" class="py-2 text-sm font-bold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition">Añadir Servicio</button>
                            </div>
                        </div>
                    `;
                    c.appendChild(card);
                });
            } catch(e) { console.error(e); c.innerHTML='Error cargando negocios'; }
        }

        function openCreateBusinessModal() { document.getElementById('modal-create-business').classList.remove('hidden'); }
        async function handleCreateBusiness(e) {
            e.preventDefault();
            const payload = {
                nombre: document.getElementById('new-biz-name').value,
                tipo_negocio: document.getElementById('new-biz-type').value,
                direccion: document.getElementById('new-biz-address').value,
                descripcion: document.getElementById('new-biz-desc').value,
                foto_url: document.getElementById('new-biz-photo').value,
                propietario_id: currentUser.id
            };
            try {
                const r = await fetch(`${API_URL}/negocios/`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
                if(r.ok) {
                    document.getElementById('modal-create-business').classList.add('hidden');
                    e.target.reset();
                    loadOwnerBusinesses();
                } else { alert("Error al crear negocio"); }
            } catch(x) { alert("Error conexión"); }
        }

        function openAddServiceModal(id, name) {
            document.getElementById('service-biz-id').value = id;
            document.getElementById('service-modal-biz-name').innerText = "Añadiendo a: " + name;
            document.getElementById('modal-add-service').classList.remove('hidden');
        }
        async function handleAddService(e) {
            e.preventDefault();
            const id = document.getElementById('service-biz-id').value;
            const payload = {
                nombre: document.getElementById('new-service-name').value,
                precio: parseFloat(document.getElementById('new-service-price').value),
                duracion: parseInt(document.getElementById('new-service-duration').value)
            };
            try {
                const r = await fetch(`${API_URL}/negocios/${id}/servicios`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
                if(r.ok) {
                    document.getElementById('modal-add-service').classList.add('hidden');
                    e.target.reset();
                    alert("Servicio añadido correctamente");
                } else { alert("Error al añadir servicio"); }
            } catch(x) { alert("Error conexión"); }
        }

        window.onload = () => {
            const u = localStorage.getItem('sector_mind_user');
            if(u) currentUser = JSON.parse(u);
            updateUI();
            lucide.createIcons();
        };
    </script>
</body>
