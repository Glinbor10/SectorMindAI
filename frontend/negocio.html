<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Negocio - Sector Mind AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center text-slate-500 hover:text-indigo-600 transition font-medium"><i data-lucide="arrow-left" class="mr-2 w-5 h-5"></i> Volver</a>
            <div id="user-status" class="text-sm font-medium text-slate-600"></div>
        </div>
    </nav>

    <!-- Main -->
    <main class="max-w-5xl mx-auto px-4 py-8 fade-in">
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden mb-8">
            <div class="h-64 md:h-80 relative bg-slate-200">
                <img id="biz-img" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-8 text-white w-full">
                    <span id="biz-type" class="uppercase text-xs font-bold tracking-widest bg-indigo-600 px-3 py-1 rounded mb-3 inline-block">Tipo</span>
                    <h1 id="biz-name" class="text-4xl md:text-5xl font-extrabold mb-2">Cargando...</h1>
                    <p class="text-white/80 flex items-center text-lg"><i data-lucide="map-pin" class="w-5 h-5 mr-2"></i> <span id="biz-address">...</span></p>
                </div>
            </div>
            
            <div class="p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Info Izquierda -->
                <div class="md:col-span-2">
                    <!-- PROPIETARIO VISIBLE AQUÍ -->
                    <div class="flex items-center mb-6 text-slate-500 text-sm bg-slate-50 p-3 rounded-xl border border-slate-100 w-fit">
                        <i data-lucide="user-check" class="w-4 h-4 mr-2 text-indigo-500"></i>
                        <span class="font-medium mr-1">Gerente:</span> 
                        <span id="biz-owner" class="text-slate-700 font-bold">...</span>
                    </div>

                    <h2 class="text-xl font-bold mb-4">Sobre nosotros</h2>
                    <p id="biz-desc" class="text-slate-600 leading-relaxed mb-8 text-lg">Descripción...</p>
                    
                    <h3 class="text-lg font-bold mb-3 flex items-center"><i data-lucide="list" class="w-5 h-5 mr-2 text-indigo-600"></i> Servicios</h3>
                    <div id="services-list" class="space-y-3"><div class="animate-pulse bg-slate-100 h-10 rounded"></div></div>
                </div>

                <!-- Panel IA -->
                <div class="bg-indigo-50 rounded-2xl p-6 border border-indigo-100 h-fit sticky top-24">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-lg"><i data-lucide="bot"></i></div>
                        <div>
                            <!-- Nombre Personalizado -->
                            <p class="font-bold text-indigo-900" id="ai-name">Asistente AI</p>
                            <p class="text-xs text-indigo-600 flex items-center"><span class="w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse"></span> Online</p>
                        </div>
                    </div>
                    <p class="text-sm text-indigo-800 mb-6">Inicia sesión para hablar con nuestra IA y reservar tu cita.</p>
                    <div class="space-y-3">
                        <button onclick="startVoiceMode()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold flex items-center justify-center transition shadow-lg"><i data-lucide="mic" class="w-5 h-5 mr-3"></i> Hablar</button>
                        <button onclick="startChatMode()" class="w-full py-4 bg-white border-2 border-indigo-200 text-indigo-700 hover:bg-indigo-50 rounded-xl font-bold flex items-center justify-center transition"><i data-lucide="message-square" class="w-5 h-5 mr-3"></i> Chatear</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Login (Simplificado para redirect) -->
    <div id="login-redirect-modal" class="fixed inset-0 z-50 hidden bg-slate-900/60 backdrop-blur-sm flex items-center justify-center fade-in">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm text-center">
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-600"><i data-lucide="lock" class="w-8 h-8"></i></div>
            <h3 class="text-xl font-bold mb-2">Acceso Requerido</h3>
            <p class="text-slate-500 mb-6">Para hablar con la IA y reservar, necesitas identificarte primero.</p>
            <div class="flex gap-3 justify-center">
                <button onclick="window.location.href='/'" class="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-bold">Ir a Login</button>
                <button onclick="document.getElementById('login-redirect-modal').classList.add('hidden')" class="px-5 py-2 text-slate-500 hover:text-slate-700">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Chat Window -->
    <div id="chat-window" class="fixed bottom-6 right-6 z-50 hidden flex-col bg-white w-96 h-[500px] rounded-2xl shadow-2xl border border-slate-200 overflow-hidden fade-in">
        <div class="bg-slate-900 p-4 flex justify-between items-center text-white"><span class="font-bold flex items-center gap-2">Asistente Virtual</span><button onclick="document.getElementById('chat-window').classList.add('hidden')"><i data-lucide="x"></i></button></div>
        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto bg-slate-50 space-y-3 text-sm"></div>
        <form onsubmit="handleChatSubmit(event)" class="p-3 bg-white border-t flex gap-2"><input type="text" id="chat-input" class="flex-1 border rounded-full px-4 py-2 text-sm outline-none" placeholder="Escribe..." autocomplete="off"><button class="bg-indigo-600 text-white p-2 rounded-full"><i data-lucide="send" class="w-4 h-4"></i></button></form>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';
        const RASA_URL = 'http://localhost:5005/webhooks/rest/webhook';
        const urlParams = new URLSearchParams(window.location.search);
        const businessId = urlParams.get('id');
        let businessData = null;
        let currentUser = null;

        async function init() {
            if(!businessId) { window.location.href='/'; return; }
            const stored = localStorage.getItem('sector_mind_user');
            if(stored) {
                currentUser = JSON.parse(stored);
                document.getElementById('user-status').innerHTML = `<span class="text-indigo-600 font-bold">Hola, ${currentUser.nombre}</span>`;
            } else {
                document.getElementById('user-status').innerHTML = `<a href="/" class="text-slate-400 hover:text-indigo-600">Iniciar Sesión</a>`;
            }

            try {
                const res = await fetch(`${API_URL}/negocios/`); const all = await res.json();
                businessData = all.find(b => b.id == businessId);
                if(!businessData) throw new Error("404");

                // --- RELLENO DE DATOS (CORREGIDO) ---
                document.getElementById('biz-name').innerText = businessData.nombre;
                document.getElementById('ai-name').innerText = businessData.nombre + " AI";
                
                document.getElementById('biz-type').innerText = businessData.tipo_negocio;
                
                // Estos son los que te faltaban:
                document.getElementById('biz-desc').innerText = businessData.descripcion || "Sin descripción disponible.";
                document.getElementById('biz-address').innerText = businessData.direccion || "Dirección no especificada";
                document.getElementById('biz-owner').innerText = businessData.propietario_nombre || "Anónimo";

                if(businessData.foto_url && businessData.foto_url.startsWith('http')) document.getElementById('biz-img').src = businessData.foto_url;
                else document.getElementById('biz-img').src = `https://source.unsplash.com/1200x600/?${businessData.tipo_negocio === 'peluqueria' ? 'hair-salon' : 'office'}`;

                const rS = await fetch(`${API_URL}/negocios/${businessId}/servicios`); const servs = await rS.json();
                const l = document.getElementById('services-list'); l.innerHTML = '';
                servs.forEach(s => {
                    l.innerHTML += `<div class="flex justify-between items-center p-4 bg-white rounded-xl border border-slate-100"><div><p class="font-bold text-slate-800">${s.nombre}</p><div class="flex items-center text-xs text-slate-500 mt-1"><i data-lucide="clock" class="w-3 h-3 mr-1"></i> ${s.duracion_minutos} min</div></div><span class="font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg">${s.precio}€</span></div>`;
                });
            } catch(e) { console.error(e); }
            lucide.createIcons();
        }

        // --- CHAT LOGIC ---
        function startChatMode() {
            if(!currentUser) { document.getElementById('login-redirect-modal').classList.remove('hidden'); return; }
            
            const w = document.getElementById('chat-window');
            w.classList.remove('hidden'); w.classList.add('flex');
            
            // TRUCO: Enviar saludo automático con contexto
            const contextMsg = `/greet{"negocio": "${businessData.nombre}"}`;
            sendToRasa(contextMsg, true); 
        }

        async function handleChatSubmit(e){ e.preventDefault(); const i=document.getElementById('chat-input'); if(i.value){ addMsg('user',i.value); await sendToRasa(i.value); i.value='';}}
        
        async function sendToRasa(m, hidden=false) {
            try {
                const r = await fetch(RASA_URL, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender:currentUser.id,message:m})});
                const d = await r.json();
                d.forEach(x => addMsg('bot', x.text));
            } catch(e) { if(!hidden) addMsg('bot','Error conexión IA'); } 
        }
        
        function addMsg(s,t){ 
            const d=document.createElement('div'); 
            d.className=s==='user'?'bg-indigo-600 text-white p-3 rounded-2xl rounded-tr-none self-end max-w-[80%]':'bg-slate-100 text-slate-700 p-3 rounded-2xl rounded-tl-none self-start max-w-[80%]'; 
            d.innerText=t; 
            document.getElementById('chat-messages').append(d); 
        }

        // --- VOICE LOGIC ---
        function startVoiceMode(){
            if(!currentUser) { document.getElementById('login-redirect-modal').classList.remove('hidden'); return; }
            alert("Modo voz activado (Simulado: Usa Chrome para STT real).");
        }

        init();
    </script>
</body>
</html>
