<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Negocio - Sector Mind AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        /* Animación Micrófono */
        .mic-pulse { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <script>
        const API_URL = 'http://localhost:5000';
        const RASA_URL = 'http://localhost:5005/webhooks/rest/webhook';
        let currentUser = null;
        let businessData = null;
        let recognition = null;
        let isListening = false;
        let isVoiceMode = false; 
    </script>

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center cursor-pointer group" onclick="window.location.href='/'">
                    <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center mr-2 relative overflow-hidden transition-transform group-hover:scale-105">
                        <i data-lucide="calendar" class="text-indigo-300 w-6 h-6 absolute opacity-40" stroke-width="1.5"></i>
                        <i data-lucide="brain-circuit" class="text-white w-5 h-5 relative z-10"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-900">Sector Mind AI</span>
                </div>

                <div class="flex items-center space-x-4">
                    <div id="user-menu" class="hidden flex items-center gap-3 cursor-pointer" onclick="window.location.href='/perfil'">
                        <span id="user-name-display" class="font-medium text-slate-700">Usuario</span>
                        <img id="user-avatar-display" src="" class="w-10 h-10 rounded-full border-2 border-indigo-100 object-cover bg-slate-200">
                    </div>
                    <div id="auth-buttons" class="hidden flex items-center space-x-3">
                        <button onclick="openModal('modal-login')" class="text-slate-600 hover:text-indigo-600 font-medium">Iniciar Sesión</button>
                        <button onclick="openModal('modal-register')" class="bg-indigo-600 text-white px-4 py-2 rounded-full font-medium hover:bg-indigo-700">Registrarse</button>
                     </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow grid grid-cols-1 lg:grid-cols-3 gap-8 fade-in">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="relative h-64 md:h-80 rounded-3xl overflow-hidden shadow-lg group">
                <img id="biz-img" src="" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-8 text-white">
                    <span id="biz-type" class="px-3 py-1 bg-indigo-600 rounded-full text-xs font-bold uppercase tracking-wide mb-2 inline-block">Categoría</span>
                    <h1 id="biz-name" class="text-4xl md:text-5xl font-extrabold mb-2">Cargando...</h1>
                    <p id="biz-address" class="text-slate-300 flex items-center"><i data-lucide="map-pin" class="w-4 h-4 mr-2"></i> ...</p>
                </div>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="info" class="text-indigo-600"></i> Sobre nosotros
                </h3>
                <p id="biz-desc" class="text-slate-600 leading-relaxed text-lg">...</p>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i data-lucide="sparkles" class="text-indigo-600"></i> Servicios Disponibles
                </h3>
                <div id="services-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>

        <div class="lg:col-span-1">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden sticky top-24 h-[650px] flex flex-col relative">
                
                <div class="bg-slate-900 p-4 text-white">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="bg-indigo-500 p-2 rounded-xl"><i data-lucide="bot" class="w-6 h-6 text-white"></i></div>
                            <div>
                                <h3 id="ai-agent-title" class="font-bold text-lg">Agente Virtual</h3>
                                <p class="text-xs text-slate-400 flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full inline-block"></span> En línea</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex bg-slate-800 p-1 rounded-xl">
                        <button onclick="switchMode('chat')" id="tab-chat" class="flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 bg-indigo-600 text-white shadow transition-all"><i data-lucide="message-square" class="w-4 h-4"></i> Chat</button>
                        <button onclick="switchMode('voice')" id="tab-voice" class="flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 text-slate-400 hover:text-white transition-all"><i data-lucide="mic" class="w-4 h-4"></i> Voz</button>
                    </div>
                </div>

                <div id="lock-screen" class="absolute inset-0 z-50 bg-slate-50/90 backdrop-blur-sm flex flex-col items-center justify-center text-center p-6 hidden">
                    <div class="bg-white p-4 rounded-full shadow-lg mb-4">
                        <i data-lucide="lock" class="w-8 h-8 text-indigo-600"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-2">Acceso Restringido</h3>
                    <p class="text-slate-500 mb-6">Debes iniciar sesión para usar el Asistente Inteligente.</p>
                    <button onclick="openModal('modal-login')" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition transform hover:scale-105">
                        Conectarse / Registrarse
                    </button>
                </div>

                <div id="ai-container" class="flex-grow flex flex-col relative overflow-hidden">
                    
                    <div id="chat-interface" class="flex flex-col flex-grow h-full">
                        <div id="chat-messages" class="flex-grow p-4 overflow-y-auto space-y-4 bg-slate-50"></div>
                        <div class="p-4 bg-white border-t border-slate-100">
                            <form onsubmit="handleChatSubmit(event)" class="relative">
                                <input type="text" id="chat-input" placeholder="Escribe tu consulta..." autocomplete="off" class="w-full pl-5 pr-12 py-3.5 bg-slate-100 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all border border-transparent">
                                <button type="submit" class="absolute right-2 top-2 p-1.5 bg-indigo-600 text-white rounded-full hover:bg-indigo-700 transition shadow-md"><i data-lucide="send" class="w-4 h-4"></i></button>
                            </form>
                        </div>
                    </div>

                    <div id="voice-interface" class="hidden flex-col flex-grow h-full bg-slate-50 items-center justify-center text-center p-6 relative">
                        <div class="relative group cursor-pointer" onclick="toggleVoice()">
                            <div id="mic-bg" class="absolute inset-0 bg-indigo-500 rounded-full opacity-0 transition-opacity duration-300"></div>
                            <div class="w-24 h-24 bg-white border-4 border-indigo-100 rounded-full flex items-center justify-center shadow-xl relative z-10 transition-transform transform group-hover:scale-105 active:scale-95">
                                <i data-lucide="mic" id="mic-icon" class="w-10 h-10 text-indigo-600"></i>
                            </div>
                        </div>
                        <h3 id="voice-status" class="mt-8 text-xl font-bold text-slate-800">Pulsa para hablar</h3>
                        <p id="voice-transcript" class="mt-2 text-slate-500 text-sm max-w-xs mx-auto h-12">Estoy listo para escucharte...</p>
                        <div id="voice-response-box" class="mt-6 bg-white p-4 rounded-2xl shadow-sm border border-indigo-100 w-full hidden fade-in">
                            <p class="text-xs text-indigo-500 font-bold uppercase mb-1">IA Dice:</p>
                            <p id="voice-response-text" class="text-slate-700 text-sm italic">...</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="modal-login" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 relative mx-4">
            <button onclick="closeModal('modal-login')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Bienvenido</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="login-email" required placeholder="Email" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                <input type="password" id="login-password" required placeholder="Contraseña" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700">Entrar</button>
            </form>
        </div>
    </div>

    <div id="modal-register" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 relative mx-4">
            <button onclick="closeModal('modal-register')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Crear cuenta</h2>
            <form onsubmit="handleRegister(event)" class="space-y-4">
                <input type="text" id="reg-name" required placeholder="Nombre Completo" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                <input type="email" id="reg-email" required placeholder="Email" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                <input type="password" id="reg-password" required placeholder="Contraseña" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1 ml-1">Foto de perfil (Opcional)</label>
                    <input type="file" id="reg-photo-file" accept="image/*" class="w-full p-2 border border-slate-300 rounded-xl text-sm">
                </div>
                <select id="reg-rol" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500">
                    <option value="cliente">Cliente (Quiero reservar)</option>
                    <option value="propietario">Dueño de Negocio</option>
                </select>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700">Registrarse</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    saveUserSession(data);
                    closeModal('modal-login');
                    Swal.fire({ title: '¡Hola de nuevo!', text: `Conectado como ${data.nombre}`, icon: 'success', confirmButtonColor: '#4f46e5' });
                } else { Swal.fire('Error', data.error, 'error'); }
            } catch (err) { Swal.fire('Error', 'Error de conexión', 'error'); }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('nombre', document.getElementById('reg-name').value);
            formData.append('email', document.getElementById('reg-email').value);
            formData.append('password', document.getElementById('reg-password').value);
            formData.append('rol', document.getElementById('reg-rol').value);
            const fileInput = document.getElementById('reg-photo-file');
            if(fileInput.files[0]) formData.append('foto_perfil', fileInput.files[0]);

            try {
                const res = await fetch(`${API_URL}/auth/register`, { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    saveUserSession(data);
                    closeModal('modal-register');
                    Swal.fire({ title: '¡Bienvenido!', text: `Cuenta creada para ${data.nombre}`, icon: 'success', confirmButtonColor: '#4f46e5' });
                } else { Swal.fire('Error', data.error, 'error'); }
            } catch (err) { Swal.fire('Error', 'Error al registrarse', 'error'); }
        }

        function saveUserSession(userData) {
            localStorage.setItem('sector_mind_user', JSON.stringify(userData));
            currentUser = userData;
            updateUI(); 
        }

        // --- CORE UI ---
        window.onload = () => {
            lucide.createIcons();
            
            // 1. Cargar Usuario
            const userStr = localStorage.getItem('sector_mind_user');
            if (userStr) currentUser = JSON.parse(userStr);
            
            updateUI(); 

            // 2. Cargar Negocio
            const storedBiz = localStorage.getItem('selected_business');
            if (!storedBiz) { window.location.href = '/'; return; }
            businessData = JSON.parse(storedBiz);
            renderBusinessInfo(businessData);
            
            // 3. IA Context
            initChatContext(businessData.nombre);
            setupVoiceRecognition();
        };

        function updateUI() {
            // A. Navbar
            if (currentUser) {
                document.getElementById('user-menu').classList.remove('hidden');
                document.getElementById('user-menu').classList.add('flex');
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-name-display').innerText = currentUser.nombre;
                const avatar = currentUser.foto_perfil_url || `https://ui-avatars.com/api/?name=${currentUser.nombre}&background=random`;
                document.getElementById('user-avatar-display').src = avatar;
            } else {
                document.getElementById('user-menu').classList.add('hidden');
                document.getElementById('auth-buttons').classList.remove('hidden');
                document.getElementById('auth-buttons').classList.add('flex');
            }

            // B. BLOQUEO DE CHAT
            const lockScreen = document.getElementById('lock-screen');
            const aiContainer = document.getElementById('ai-container');
            
            if (currentUser) {
                lockScreen.classList.add('hidden'); 
                aiContainer.classList.remove('blur-sm', 'pointer-events-none'); 
            } else {
                lockScreen.classList.remove('hidden'); 
                aiContainer.classList.add('blur-sm', 'pointer-events-none'); 
            }
        }

        function renderBusinessInfo(biz) {
            document.getElementById('biz-name').innerText = biz.nombre;
            document.getElementById('biz-desc').innerText = biz.descripcion || "Sin descripción.";
            document.getElementById('biz-address').innerHTML = `<i data-lucide="map-pin" class="w-4 h-4 mr-2"></i> ${biz.direccion || 'Dirección no disponible'}`;
            document.getElementById('biz-type').innerText = biz.tipo_negocio;
            
            // CAMBIO AQUÍ: ACTUALIZAR EL TÍTULO DEL AGENTE
            document.getElementById('ai-agent-title').innerText = `Agente IA de ${biz.nombre}`;

            const imgUrl = biz.foto_url || 'https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1200&q=80';
            document.getElementById('biz-img').src = imgUrl;

            if (biz.servicios) renderServices(biz.servicios);
            else fetchServices(biz.id);
        }

        async function fetchServices(negocioId) {
            try {
                const res = await fetch(`${API_URL}/negocios/${negocioId}/servicios`);
                const servicios = await res.json();
                renderServices(servicios);
            } catch (e) { console.error(e); }
        }

        function renderServices(servicios) {
            const list = document.getElementById('services-list');
            list.innerHTML = '';
            if (!servicios || servicios.length === 0) { list.innerHTML = '<p class=\"text-slate-400 italic\">No hay servicios.</p>'; return; }
            servicios.forEach(s => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-4 border border-slate-100 rounded-2xl hover:border-indigo-100 hover:bg-indigo-50/30 transition";
                div.innerHTML = `<div><h4 class=\"font-bold text-slate-800\">${s.nombre}</h4><p class=\"text-xs text-slate-500 flex items-center gap-1\"><i data-lucide=\"clock\" class=\"w-3 h-3\"></i> ${s.duracion_minutos} min</p></div><span class=\"font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg\">${s.precio}€</span>`;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        // --- IA LOGIC ---
        function switchMode(mode) {
            const chatUI = document.getElementById('chat-interface');
            const voiceUI = document.getElementById('voice-interface');
            const btnChat = document.getElementById('tab-chat');
            const btnVoice = document.getElementById('tab-voice');

            if (mode === 'chat') {
                isVoiceMode = false;
                chatUI.classList.remove('hidden');
                voiceUI.classList.add('hidden'); voiceUI.classList.remove('flex');
                btnChat.classList.add('bg-indigo-600', 'text-white', 'shadow'); btnChat.classList.remove('text-slate-400');
                btnVoice.classList.remove('bg-indigo-600', 'text-white', 'shadow'); btnVoice.classList.add('text-slate-400');
                if(isListening && recognition) recognition.stop();
            } else {
                isVoiceMode = true;
                chatUI.classList.add('hidden');
                voiceUI.classList.remove('hidden'); voiceUI.classList.add('flex');
                btnVoice.classList.add('bg-indigo-600', 'text-white', 'shadow'); btnVoice.classList.remove('text-slate-400');
                btnChat.classList.remove('bg-indigo-600', 'text-white', 'shadow'); btnChat.classList.add('text-slate-400');
            }
        }

        function initChatContext(nombreNegocio) {
            addMsg('bot', `¡Hola! Soy el agente de IA de ${nombreNegocio}, ¿en qué puedo ayudarte?`);
            sendToRasa(`/greet{"negocio": "${nombreNegocio}"}`, true);
        }

        async function handleChatSubmit(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            addMsg('user', msg);
            input.value = '';
            const typingId = showTyping();
            await sendToRasa(msg, false, typingId);
        }

        async function sendToRasa(msg, hidden = false, typingElementId = null) {
            try {
                const payload = { sender: currentUser ? currentUser.id : "anonimo", message: msg };
                const res = await fetch(RASA_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (typingElementId && document.getElementById(typingElementId)) document.getElementById(typingElementId).remove();
                if (!hidden) {
                    if (data.length === 0) handleBotResponse('Ups, no he entendido eso. ¿Puedes repetirlo?');
                    else data.forEach(rta => handleBotResponse(rta.text));
                }
            } catch (err) {
                if (typingElementId) document.getElementById(typingElementId).remove();
                if (!hidden) handleBotResponse('Error de conexión con la IA.');
            }
        }

        function handleBotResponse(text) {
            addMsg('bot', text);
            if (isVoiceMode) {
                const voiceResBox = document.getElementById('voice-response-box');
                document.getElementById('voice-response-text').innerText = text;
                voiceResBox.classList.remove('hidden');
                speakText(text);
            }
        }

        function addMsg(sender, text) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = sender === 'user' ? "flex gap-3 flex-row-reverse fade-in" : "flex gap-3 fade-in";
            div.innerHTML = sender === 'user' 
                ? `<div class=\"w-8 h-8 rounded-full bg-slate-900 text-white flex items-center justify-center text-xs font-bold flex-shrink-0\">YO</div><div class=\"bg-indigo-600 text-white p-3 rounded-2xl rounded-tr-none shadow-md text-sm max-w-[80%]\">${text}</div>`
                : `<div class=\"w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs font-bold flex-shrink-0\">IA</div><div class=\"bg-white text-slate-600 p-3 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 text-sm max-w-[80%]\">${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chat-messages');
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex gap-3 fade-in";
            div.innerHTML = `<div class=\"w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs font-bold flex-shrink-0\">IA</div><div class=\"bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 flex gap-1 items-center\"><div class=\"w-2 h-2 bg-slate-400 rounded-full typing-dot\"></div><div class=\"w-2 h-2 bg-slate-400 rounded-full typing-dot\"></div><div class=\"w-2 h-2 bg-slate-400 rounded-full typing-dot\"></div></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        // --- WEB SPEECH API ---
        function setupVoiceRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                document.getElementById('voice-status').innerText = "Tu navegador no soporta voz.";
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false; 
            recognition.onstart = () => {
                isListening = true;
                document.getElementById('voice-status').innerText = "Escuchando...";
                document.getElementById('mic-bg').classList.add('mic-pulse', 'opacity-100');
            };
            recognition.onend = () => {
                isListening = false;
                document.getElementById('voice-status').innerText = "Pulsa para hablar";
                document.getElementById('mic-bg').classList.remove('mic-pulse', 'opacity-100');
            };
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('voice-transcript').innerText = `"${transcript}"`;
                sendToRasa(transcript);
            };
        }

        function toggleVoice() {
            if (!recognition) return;
            if (isListening) recognition.stop();
            else { window.speechSynthesis.cancel(); recognition.start(); }
        }

        function speakText(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
