name: Sector Mind CI

# Se ejecuta cuando haces push a trunk
on:
  push:
    branches: [ "trunk" ]
  pull_request:
    branches: [ "trunk" ]

jobs:
  # TRABAJO 1: VERIFICAR BACKEND (FLASK) + PostgreSQL
  test-backend:
    runs-on: ubuntu-latest
    
    # Servicio PostgreSQL para tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sectormind
          POSTGRES_PASSWORD: password
          POSTGRES_DB: sectormind_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8
        
    - name: Lint with Flake8 (Calidad de código)
      run: |
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Initialize PostgreSQL Schema
      env:
        DATABASE_URL: postgresql://sectormind:password@localhost:5432/sectormind_db
      run: |
        # Ejecuta el script de gestión de base de datos para crear tablas
        python -m backend.manage_db
        
    - name: Run Backend Tests (92 tests)
      env:
        DATABASE_URL: postgresql://sectormind:password@localhost:5432/sectormind_db
      run: |
        PYTHONPATH=. pytest backend/tests -v

  # TRABAJO 2: VERIFICAR IA (RASA)
  test-rasa:
    runs-on: ubuntu-latest
    needs: test-backend # Solo se ejecuta si el backend está bien
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install rasa pytest
        
    - name: Rasa Data Validation
      # Comprueba si hay errores en domain.yml, nlu.yml o stories.yml
      run: |
        cd rasa_model
        rasa data validate

    - name: Run Rasa Actions Tests (12 tests)
      run: |
        PYTHONPATH=. pytest rasa_model/tests/test_acciones.py -v

    - name: Rasa NLU Cross-Validation
      # Entrena un modelo ligero y lo prueba con cross-validation
      # Esto asegura que los nuevos ejemplos no confunden a la IA
      run: |
        cd rasa_model
        rasa test nlu --cross-validation --folds 3