name: Sector Mind CI

# Se ejecuta cuando haces push a la rama main o pull request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # TRABAJO 1: VERIFICAR BACKEND (FLASK)
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Instalamos librerías del proyecto + librerías de test
        pip install -r requirements.txt
        pip install pytest flake8
        
    - name: Lint with Flake8 (Calidad de código)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Backend Tests
      run: |
        # Ejecuta el script de gestión de base de datos para crear la estructura antes de testear
        python -m backend.manage_db
        # Ejecuta los tests
        pytest tests/

  # TRABAJO 2: VERIFICAR IA (RASA)
  test-rasa:
    runs-on: ubuntu-latest
    needs: test-backend # Solo se ejecuta si el backend está bien
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install Rasa dependencies
      run: |
        python -m pip install --upgrade pip
        pip install rasa
        
    - name: Rasa Data Validation
      # Esto comprueba si hay errores en domain.yml, nlu.yml o stories.yml
      run: |
        cd rasa_model
        rasa data validate

    - name: Rasa NLU Test
      # Entrena un modelo ligero y lo prueba (Cross-validation)
      # Esto asegura que tus nuevos ejemplos no confunden a la IA
      run: |
        cd rasa_model
        rasa test nlu --cross-validation --folds 3