version: "3.1"

rules:

    # ============================================
    # REGLAS DE INTENTS ESPECÍFICOS
    # ============================================
    
    - rule: Saludo inicial
      steps:
        - intent: greet
        - action: action_set_contexto
        - action: utter_greet_con_negocio

    - rule: Despedida
      steps:
        - intent: goodbye
        - action: utter_goodbye

    - rule: Agradecimiento
      steps:
        - intent: thanks
        - action: utter_thanks

    - rule: Bot challenge
      steps:
        - intent: bot_challenge
        - action: action_responder_bot_challenge

    - rule: Reservar servicio
      steps:
        - intent: reservar_servicio
        - action: action_normalizar_servicio

    - rule: Consultar servicios
      steps:
        - intent: consultar_servicios
        - action: action_listar_servicios

    - rule: Consultar horarios
      steps:
        - intent: consultar_horarios
        - action: action_mostrar_horarios

    - rule: Consultar ubicacion
      steps:
        - intent: consultar_ubicacion
        - action: action_mostrar_ubicacion

    - rule: Informar ubicacion
      steps:
        - intent: informar_ubicacion
        - action: action_mostrar_ubicacion

    - rule: Ver historial citas
      steps:
        - intent: ver_historial_citas
        - action: action_consultar_citas_usuario

    - rule: Consultar mis citas
      steps:
        - intent: consultar_mis_citas
        - action: action_consultar_citas_usuario

    - rule: Cancelar cita
      steps:
        - intent: cancelar_cita
        - action: action_cancelar_cita

    - rule: Cambiar horario
      steps:
        - intent: cambiar_horario
        - action: action_cambiar_horario

    - rule: Info general
      steps:
        - intent: info_general
        - action: action_info_negocio

    - rule: Pedir mas opciones
      steps:
        - intent: pedir_mas_opciones
        - action: action_mostrar_disponibilidad

    # ============================================
    # FALLBACK - Captura TODO lo que no tenga intent claro
    # El action_fallback_inteligente redirige según flujo_activo
    # ============================================
    
    - rule: Fallback universal
      steps:
        - intent: nlu_fallback
        - action: action_fallback_inteligente

    # ============================================
    # SELECCIONAR CITA - También va al fallback inteligente
    # Porque necesita routing según flujo_activo
    # ============================================
    
    - rule: Seleccionar cita routing
      steps:
        - intent: seleccionar_cita
        - action: action_fallback_inteligente

    # ============================================
    # AFFIRM/DENY - Van al fallback para confirmaciones
    # ============================================
    
    - rule: Affirm routing
      steps:
        - intent: affirm
        - action: action_fallback_inteligente
    
    - rule: Deny routing
      steps:
        - intent: deny
        - action: action_fallback_inteligente

    # ============================================
    # INFORM - Fechas/horas van al fallback
    # ============================================
    
    - rule: Inform routing
      steps:
        - intent: inform
        - action: action_fallback_inteligente

