version: "3.1"

rules:

    - rule: Reservar servicio
      steps:
        - intent: reservar_servicio
        - action: action_normalizar_servicio

    - rule: Fallback - prioritario
      steps:
        - intent: nlu_fallback
        - action: action_fallback_inteligente
    
    - rule: Seleccionar cita para cambiar (PRIORIDAD)
      condition:
        - slot_was_set:
            - esperando_seleccion_cambio: true
      steps:
        - intent: seleccionar_cita
        - action: action_seleccionar_cita_cambio
        
    - rule: Cualquier mensaje cuando esperando fecha (NO en cambio)
      condition:
        - slot_was_set:
            - esperando_fecha: true
        - slot_was_set:
            - esperando_seleccion_cambio: false
      steps:
        - action: action_reservar_cita
        
    - rule: Capturar contexto inicial
      steps:
        - intent: greet
        - action: action_set_contexto
        - action: utter_greet_con_negocio

    - rule: Despedida
      steps:
        - intent: goodbye
        - action: utter_goodbye

    - rule: Challenge
      steps:
        - intent: bot_challenge
        - action: action_responder_bot_challenge

    - rule: Responder a más opciones
      steps:
        - intent: pedir_mas_opciones
        - action: utter_pedir_servicio

    - rule: Consultar citas
      steps:
        - intent: consultar_mis_citas
        - action: action_consultar_citas_usuario

    - rule: Ver historial de citas
      steps:
        - intent: ver_historial_citas
        - action: action_consultar_citas_usuario

    - rule: Cancelar cita
      steps:
        - intent: cancelar_cita
        - action: action_cancelar_cita

    - rule: Confirmar cancelación
      steps:
        - intent: affirm
        - action: action_cancelar_cita

    - rule: Denegar cancelación
      steps:
        - intent: deny
        - action: action_denegar_cancelacion

    - rule: Cambiar horario de cita
      steps:
        - intent: cambiar_horario
        - action: action_cambiar_horario