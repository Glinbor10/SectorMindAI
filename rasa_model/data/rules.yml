version: "3.1"

rules:

  # 1. Saludo automático de la web (Rellena el slot negocio)
  - rule: Saludo con contexto
    steps:
      - intent: greet
      - slot_was_set:
          - negocio
      - action: utter_greet_con_negocio

  # 2. El usuario pide servicio -> Confirmamos directamente
  - rule: Petición de servicio directa
    steps:
      - intent: reservar_servicio
      - action: utter_confirmar_reserva

  # 3. Básicos
  - rule: Despedida
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Challenge
    steps:
      - intent: bot_challenge
      - action: utter_iamabot