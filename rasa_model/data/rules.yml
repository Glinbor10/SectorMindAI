version: "3.1"

rules:
  - rule: Capturar contexto inicial
    steps:
      - intent: greet
      - action: action_set_contexto
      - action: utter_greet_con_negocio

  - rule: Despedida
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Challenge
    steps:
      - intent: bot_challenge
      - action: action_responder_bot_challenge

  - rule: Responder a más opciones
    steps:
      - intent: pedir_mas_opciones
      - action: utter_pedir_servicio

  - rule: Fallback
    steps:
      - intent: nlu_fallback
      - action: utter_default