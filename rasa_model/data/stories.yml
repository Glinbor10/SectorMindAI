version: "3.1"

stories:

- story: Saludo inicial
  steps:
    - intent: greet
    - action: action_set_contexto
    - slot_was_set:
        - tipo_negocio
    - action: utter_greet_con_negocio

- story: Despedida
  steps:
    - intent: goodbye
    - action: utter_goodbye

- story: Consultar información del negocio
  steps:
    - intent: info_general
    - action: action_info_negocio

- story: Consultar horarios
  steps:
    - intent: consultar_horarios
    - action: action_mostrar_horarios

- story: Consultar servicios y precios
  steps:
    - intent: consultar_servicios
    - action: action_listar_servicios

- story: Consultar ubicación
  steps:
    - intent: consultar_ubicacion
    - action: action_mostrar_ubicacion

- story: Reservar servicio directo
  steps:
    - intent: reservar_servicio
    - action: action_normalizar_servicio
    - slot_was_set:
        - esperando_fecha: true

- story: Cancelar cita - una sola
  steps:
    - intent: cancelar_cita
    - action: action_cancelar_cita
    - intent: affirm
    - action: action_cancelar_cita

- story: Cancelar cita - selección múltiple
  steps:
    - intent: cancelar_cita
    - action: action_cancelar_cita
    - intent: seleccionar_cita
    - action: action_confirmar_cancelacion
    - intent: affirm
    - action: action_cancelar_cita