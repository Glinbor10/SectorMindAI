version: "3.1"

nlu:
  - intent: greet
    examples: |
      - hola
      - buenos días
      - qué tal
      - buenas tardes
      - hola buenas

  - intent: goodbye
    examples: |
      - adiós
      - hasta luego
      - chao
      - bye
      - nos vemos
      
  - intent: bot_challenge
    examples: |
      - qué eres
      - que eres
      - que ere
      - eres un bot
      - eres una ia
      - eres humano
      - eres artificial
      - quién eres
      - quien eres
      - quienes sois
      - quienes osois
      - quienees osis
      - que sois
      - quien sos
      - que sos
      - qué es esto
      - que es esto

  - intent: consultar_mis_citas
    examples: |
      - quiero ver mis citas
      - mis citas
      - ver mis turnos
      - mis reservas
      - consultar mis citas

  - intent: cancelar_cita
    examples: |
      - cancelar mi cita
      - quiero anular
      - borrar reserva
      - anular turno
      - eliminar mi cita

  - intent: seleccionar_cita
    examples: |
      - 1
      - 2
      - la 1
      - cita 1
      - número 1

  - intent: consultar_horarios
    examples: |
      - ver horario
      - cuál es el horario
      - quiero ver tu horario
      - qué horarios tienes
      - ver huecos disponibles

  - intent: affirm
    examples: |
      - sí
      - si
      - correcto
      - claro
      - vale

  - intent: deny
    examples: |
      - no
      - prefiero no
      - en realidad no
      - no gracias
      - mejor no

  - intent: reservar_servicio
    examples: |
      - quiero reservar
      - reserva una cita
      - quiero hacer una reserva
      - necesito una cita
      - quiero agendar
      - quiero reservar para el lunes a las 10
      - reservar para mañana a las 9:30
      - quiero reservar para el viernes a las 11:00
      - reservar para el martes a las 15:00
      - reservar para el miércoles a las 12:15

  - intent: consultar_servicios
    examples: |
      - qué servicios ofrecen
      - qué hacen aquí
      - qué servicios tienen
      - qué tratamientos
      - qué ofrecen

  - intent: consultar_ubicacion
    examples: |
      - dónde están
      - cuál es la dirección
      - dónde queda
      - cómo llegar
      - ubicación

  - intent: cambiar_horario
    examples: |
      - cambiar mi cita
      - modificar horario
      - cambiar fecha
      - cambiar turno
      - quiero cambiar la cita

  - intent: info_general
    examples: |
      - cuéntame sobre el negocio
      - qué es esto
      - información general
      - qué hacen
      - sobre el negocio

  - intent: pedir_mas_opciones
    examples: |
      - más opciones
      - ver más días
      - otros horarios
      - más fechas
      - otras alternativas