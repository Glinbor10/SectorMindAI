version: "3.1"

nlu:
- intent: greet
  examples: |
    - hola
    - buenos días
    - /greet{"negocio": "FisioMente Centro"}
    - /greet{"negocio": "Peluquería Estilo"}
    - /greet{"negocio": "Taller Paco"}

- intent: goodbye
  examples: |
    - adiós
    - hasta luego
    - chao

- intent: reservar_servicio
  examples: |
    - [punción seca](servicio)
    - quiero [masaje](servicio)
    - [corte de pelo](servicio)
    - [cambio de aceite](servicio)
    - [limpieza dental](servicio)
    - necesito [fisioterapia](servicio)
    - [tinte](servicio)
    - solo [revisión](servicio)
    - quiero reservar [manicura](servicio)

- intent: affirm
  examples: |
    - sí
    - correcto
    - vale
    - perfecto

- intent: deny
  examples: |
    - no
    - espera
    - corregir

- intent: bot_challenge
  examples: |
    - eres un bot?
    - eres humano?