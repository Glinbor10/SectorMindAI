version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - reservar_servicio
  - informar_fecha
  - bot_challenge
  - consultar_horarios
  - consultar_servicios
  - consultar_ubicacion
  - consultar_mis_citas
  - cancelar_cita
  - info_general
  - inform
  - pedir_mas_opciones

entities:
  - negocio
  - servicio
  - fecha

slots:
  negocio:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: negocio

  negocio_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  cliente_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  servicio:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: servicio
      - type: from_text
        intent: reservar_servicio

  servicio_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  fecha:
    type: text
    influence_conversation: false
    mappings:
      - type: from_text
        intent: informar_fecha

  horarios_disponibles:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  cita_a_cancelar_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  citas_disponibles:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

responses:
  utter_greet_con_negocio:
    - text: "¡Hola! Bienvenido a {negocio}. ¿Qué servicio necesitas?"

  utter_pedir_servicio:
    - text: "¿Qué servicio te gustaría reservar?"

  utter_goodbye:
    - text: "¡Hasta luego! Si necesitas algo más, aquí estaré."

  utter_default:
    - text: "No he entendido bien. ¿Puedes repetirlo?"

actions:
  - action_set_contexto
  - action_normalizar_servicio
  - action_mostrar_disponibilidad
  - action_reservar_cita
  - action_info_negocio
  - action_mostrar_horarios
  - action_listar_servicios
  - action_mostrar_ubicacion
  - action_consultar_citas_usuario
  - action_cancelar_cita
  - action_confirmar_cancelacion
  - action_responder_bot_challenge

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true