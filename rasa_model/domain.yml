version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - afirmar
  - deny
  - reservar_servicio
  - informar_fecha
  - bot_challenge
  - consultar_horarios
  - consultar_servicios
  - consultar_ubicacion
  - consultar_mis_citas
  - cancelar_cita
  - cambiar_horario
  - info_general
  - inform
  - pedir_mas_opciones
  - nlu_fallback
  # Intents de URGENCIAS (contextuales por tipo de negocio)
  - urgencia_dentista
  - urgencia_fisioterapia
  - urgencia_peluqueria
  - urgencia_dental_dolor
  - urgencia_dental_bracket
  - urgencia_dental_diente
  - perdida_empaste
  - corte_urgente_evento
  - corte_regular
  - desastre_tinte
  - dolor_agudo_espalda
  - lesion_deportiva
  - contractura_muscular
  - urgencia_fisio_aguda
  - limpieza_dental
  - masaje_descarga
  - tinte_regular

entities:
  - negocio
  - servicio
  - fecha

slots:
  cliente_id:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  negocio_id:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  tipo_negocio:
    type: categorical
    values:
      - dentista
      - peluqueria
      - fisioterapia
    influence_conversation: true
    mappings:
      - type: custom

  negocio:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  servicio:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: servicio
      - type: from_text
        intent: reservar_servicio

  servicio_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  fecha:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        intent: informar_fecha
      - type: from_entity
        entity: fecha

  horarios_disponibles:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  cita_a_cancelar_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  citas_disponibles:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  confirmando_cancelacion:
    type: bool
    influence_conversation: false
    mappings:
      - type: custom

  es_urgencia:
    type: bool
    influence_conversation: false
    mappings:
      - type: custom

responses:
  utter_greet_con_negocio:
    - text: "¡Hola! Bienvenido a {negocio}. ¿Qué servicio necesitas?"

  utter_greet:
    - text: "¡Hola! ¿En qué puedo ayudarte hoy?"

  utter_pedir_servicio:
    - text: "Puedo ayudarte con: 📅 Reservar citas, 💰 Consultar precios y servicios, 🕒 Ver horarios de apertura, 📍 Información de ubicación, 📋 Ver tus citas pendientes. ¿Qué te gustaría hacer?"

  utter_goodbye:
    - text: "¡Hasta luego! Si necesitas algo más, aquí estaré."

  utter_default:
    - text: "No he entendido bien. ¿Puedes repetirlo?"
  
  utter_pedir_negocio:
    - text: "¿Para qué negocio necesitas ayuda? (dentista, fisioterapia, peluqueria)"

  utter_confirmacion:
    - text: "✅ ¡Perfecto! Tu cita ha sido reservada correctamente."

  utter_urgencia_confirmada:
    - text: "¡Urgencia confirmada! Te atenderemos lo antes posible."

  utter_confirmar_cancelacion:
    - text: "¿Seguro que quieres cancelar esta cita? Responde 'sí' para confirmar o 'no' para mantenerla."

  utter_confirmacion_eliminada:
    - text: "✅ Cita cancelada correctamente. Si quieres, puedo ayudarte a reservar una nueva."

  utter_pedir_nueva_fecha:
    - text: "¿Qué fecha y hora prefieres para reprogramar? (Ej.: 'mañana a las 10', 'el viernes por la tarde')"

actions:
  - action_set_contexto
  - action_normalizar_servicio
  - action_mostrar_disponibilidad
  - action_reservar_cita
  - action_info_negocio
  - action_mostrar_horarios
  - action_listar_servicios
  - action_mostrar_ubicacion
  - action_consultar_citas_usuario
  - action_cancelar_cita
  - action_confirmar_cancelacion
  - action_cancelar_cita_confirmada
  - action_responder_bot_challenge
  # Actions de URGENCIAS
  - action_urgencia_dental
  - action_urgencia_peluqueria
  - action_urgencia_fisioterapia
  - action_buscar_urgencia_proxima

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true