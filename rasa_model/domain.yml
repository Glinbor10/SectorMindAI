version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - reservar_servicio
  - bot_challenge

entities:
  - negocio
  - servicio

slots:
  negocio:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: negocio

  servicio:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: servicio

responses:
  utter_greet_con_negocio:
    - text: "¡Hola! Bienvenido a {negocio}. ¿Qué servicio te gustaría reservar hoy?"

  utter_confirmar_reserva:
    - text: "Perfecto. Buscando disponibilidad para **{servicio}** en **{negocio}**. ¿Te parece bien?"

  utter_goodbye:
    - text: "¡Hasta luego! Gracias por tu visita."

  utter_iamabot:
    - text: "Soy un bot inteligente creado con Rasa."

  utter_default:
    - text: "No he entendido bien. ¿Quieres reservar un servicio?"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true