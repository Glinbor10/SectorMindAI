version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - reservar_servicio
  - bot_challenge
  - consultar_horarios
  - consultar_servicios
  - consultar_ubicacion
  - consultar_mis_citas
  - cancelar_cita
  - cambiar_horario
  - seleccionar_cita
  - ver_historial_citas
  - info_general
  - inform
  - pedir_mas_opciones
  - nlu_fallback

entities:
  - negocio
  - servicio
  - fecha
  - time
  - number

slots:
  cliente_id:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  negocio_id:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  tipo_negocio:
    type: categorical
    values:
      - dentista
      - peluqueria
      - fisioterapia
    influence_conversation: true
    mappings:
      - type: custom

  negocio:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  servicio:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  servicio_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  horarios_disponibles:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  cita_a_cancelar_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  citas_disponibles:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  confirmando_cancelacion:
    type: bool
    influence_conversation: false
    mappings:
      - type: custom

  esperando_fecha:
    type: bool
    influence_conversation: true
    mappings:
      - type: custom

  esperando_seleccion_cambio:
    type: bool
    influence_conversation: true
    mappings:
      - type: custom

responses:
    utter_ask_servicio:
      - text: "¿Qué servicio quieres reservar?"

    utter_ask_fecha:
      - text: "¿Para qué día y hora quieres la cita?"

    utter_greet_con_negocio:
      - text: "¡Hola! Bienvenido a {negocio}. ¿Qué servicio necesitas?"

    utter_greet:
      - text: "¡Hola! ¿En qué puedo ayudarte hoy?"

    utter_pedir_servicio:
      - text: "Puedo ayudarte con: 📅 Reservar citas, 💰 Consultar precios y servicios, 🕒 Ver horarios de apertura, 📍 Información de ubicación, 📋 Ver tus citas pendientes. ¿Qué te gustaría hacer?"

    utter_goodbye:
      - text: "¡Hasta luego! Si necesitas algo más, aquí estaré."

    utter_default:
      - text: "No he entendido bien. ¿Puedes repetirlo?"
    
    utter_pedir_negocio:
      - text: "¿Para qué negocio necesitas ayuda? (dentista, fisioterapia, peluqueria)"

    utter_confirmacion:
      - text: "✅ ¡Perfecto! Tu cita ha sido reservada correctamente."


    utter_confirmar_cancelacion:
      - text: "¿Seguro que quieres cancelar esta cita? Responde 'sí' para confirmar o 'no' para mantenerla."

    utter_confirmacion_eliminada:
      - text: "✅ Cita cancelada correctamente. Si quieres, puedo ayudarte a reservar una nueva."

    utter_pedir_nueva_fecha:
      - text: "¿Qué fecha y hora prefieres para reprogramar? (Ej.: 'mañana a las 10', 'el viernes por la tarde')"

actions:
    - action_set_contexto
    - action_normalizar_servicio
    - action_mostrar_disponibilidad
    - action_reservar_cita
    - action_info_negocio
    - action_mostrar_horarios
    - action_listar_servicios
    - action_mostrar_ubicacion
    - action_consultar_citas_usuario
    - action_cancelar_cita
    - action_confirmar_cancelacion
    - action_cambiar_horario
    - action_seleccionar_cita_cambio
    - action_confirmar_cambio_horario
    - action_denegar_cancelacion
    - action_fallback_inteligente
    - action_responder_bot_challenge

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true