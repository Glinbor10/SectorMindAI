version: "3.1"

nlu:
  - intent: saludar
    examples: |
      - hola
      - buenas tardes
      - qué tal
      - buenos días
      - hey

  - intent: urgencia_dentista
    examples: |
      - me duele mucho la muela
      - dolor de muelas insoportable
      - tengo una caries que me mata
      - urgencia dental por dolor de dientes
      - muela inflamada urgente
      - dolor de espalda pero en realidad es muela
      - cuello rígido pero es dolor de muelas

  - intent: urgencia_fisioterapia
    examples: |
      - me duele la espalda terriblemente
      - dolor de espalda agudo
      - contractura muscular urgente
      - lesión en la espalda necesito ayuda
      - cuello rígido doloroso
      - dolor de muelas pero en realidad espalda
      - cabeza que duele pero es espalda

  - intent: urgencia_peluqueria
    examples: |
      - me duele el cuero cabelludo
      - dolor en el cuero cabelludo urgente
      - cabeza que me arde del pelo
      - urgencia por dolor de cuero cabelludo
      - dolor de muelas en el cuero
      - espalda que duele en la cabeza

  - intent: pedir_cita_dentista
    examples: |
      - quiero una cita para el dentista por dolor de muelas
      - necesito ver al odontólogo por caries
      - tengo un problema con mis dientes
      - cita odontológica urgente
      - dolor de espalda en la boca
      - necesito fisioterapia para mis muelas
      - cita para peluquería pero me duelen las muelas

  - intent: pedir_cita_fisioterapia
    examples: |
      - cita para fisioterapia por dolor de espalda
      - necesito rehabilitación por lesión muscular
      - tengo contracturas en el cuello
      - terapia física para esguince
      - dolor de muelas en la espalda
      - necesito dentista para mi contractura
      - cita para peluquería pero me duele la espalda

  - intent: pedir_cita_peluqueria
    examples: |
      - quiero una cita para la peluquería
      - necesito cortar el pelo
      - cita para teñir el cabello
      - arreglo de barba
      - dolor de muelas en el pelo
      - necesito fisioterapia para mi cabello
      - cita para dentista pero quiero cortar el pelo

  - intent: cancelar_cita
    examples: |
      - quiero cancelar mi cita
      - anular reserva
      - no puedo ir a la cita

  - intent: cambiar_horario
    examples: |
      - cambiar la hora de mi cita
      - modificar horario
      - quiero otra hora

  - intent: urgencia
    examples: |
      - es urgente
      - necesito atención inmediata
      - dolor fuerte ahora